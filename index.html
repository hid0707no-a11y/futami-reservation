<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ふたみ潮風ふれあい公園 予約システム</title>
<style>
/* ========== RESET & BASE ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --main: #7EAEC2;
  --main-dark: #5a8fa8;
  --main-light: #b5d4e2;
  --accent: #D4A047;
  --accent-dark: #b8872e;
  --bg: #F5F0EB;
  --white: #ffffff;
  --text: #333333;
  --text-light: #666666;
  --text-muted: #999999;
  --border: #e0d8d0;
  --danger: #e05555;
  --success: #4caf50;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-hover: 0 4px 20px rgba(0,0,0,0.12);
  --radius: 16px;
  --radius-sm: 10px;
  --max-width: 480px;
}

html { font-size: 16px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Segoe UI", Meiryo, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ========== LAYOUT ========== */
.app {
  max-width: var(--max-width);
  margin: 0 auto;
  min-height: 100vh;
  background: var(--bg);
  position: relative;
}

.screen {
  display: none;
  padding: 0 16px 100px;
  animation: fadeIn 0.3s ease;
}
.screen.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ========== HEADER ========== */
.header {
  background: linear-gradient(135deg, var(--main) 0%, var(--main-dark) 100%);
  color: var(--white);
  padding: 20px 16px 16px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.header-logo {
  font-size: 1.3rem;
  font-weight: 700;
  letter-spacing: 0.05em;
}
.header-sub {
  font-size: 0.8rem;
  opacity: 0.9;
  margin-top: 2px;
}

/* Back button in header */
.header-back {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--white);
  font-size: 1.5rem;
  cursor: pointer;
  padding: 8px;
  line-height: 1;
  border-radius: 8px;
}
.header-back:active { background: rgba(255,255,255,0.2); }
.header-back.hidden { display: none; }

/* ========== BUTTONS ========== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 52px;
  padding: 14px 24px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 1.05rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
  width: 100%;
}
.btn:active { transform: scale(0.98); }

.btn-primary {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
  color: var(--white);
  box-shadow: 0 3px 12px rgba(212,160,71,0.3);
}
.btn-primary:hover { box-shadow: 0 4px 16px rgba(212,160,71,0.4); }

.btn-secondary {
  background: var(--white);
  color: var(--main-dark);
  border: 2px solid var(--main);
}
.btn-secondary:hover { background: var(--main-light); color: var(--white); border-color: var(--main-light); }

.btn-outline {
  background: transparent;
  color: var(--main-dark);
  border: 2px solid var(--border);
}
.btn-outline:hover { border-color: var(--main); }

/* ========== CARDS ========== */
.card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
  transition: box-shadow 0.2s, transform 0.2s;
}
.card-clickable { cursor: pointer; }
.card-clickable:hover { box-shadow: var(--shadow-hover); }
.card-clickable:active { transform: scale(0.98); }

/* ========== TOP SCREEN ========== */
.top-hero {
  text-align: center;
  padding: 28px 0 20px;
}
.top-hero-icon { font-size: 3rem; margin-bottom: 8px; }
.top-hero-title {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--main-dark);
  margin-bottom: 4px;
}
.top-hero-desc {
  font-size: 0.9rem;
  color: var(--text-light);
}

.top-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}
.top-action-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 24px 16px;
  text-align: center;
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: all 0.2s;
  border: 2px solid transparent;
}
.top-action-card:hover {
  box-shadow: var(--shadow-hover);
  border-color: var(--main);
}
.top-action-card:active { transform: scale(0.97); }
.top-action-icon { font-size: 2.5rem; display: block; margin-bottom: 10px; }
.top-action-label {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--text);
}
.top-action-desc {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-top: 4px;
}

/* Info section */
.info-section {
  background: var(--white);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
}
.info-title {
  font-size: 1rem;
  font-weight: 700;
  color: var(--main-dark);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.info-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.95rem;
}
.info-row:last-child { border-bottom: none; }
.info-label { color: var(--text-light); }
.info-value { font-weight: 600; }

/* ========== DATE SEARCH SCREEN ========== */
.section-title {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--text);
  margin: 24px 0 12px;
}

.form-group {
  margin-bottom: 20px;
}
.form-label {
  display: block;
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
}
.form-input {
  width: 100%;
  min-height: 52px;
  padding: 12px 16px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 1.05rem;
  color: var(--text);
  background: var(--white);
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.form-input:focus {
  outline: none;
  border-color: var(--main);
}
.form-input::placeholder { color: var(--text-muted); }

/* Number stepper */
.stepper {
  display: flex;
  align-items: center;
  gap: 16px;
}
.stepper-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 2px solid var(--main);
  background: var(--white);
  color: var(--main-dark);
  font-size: 1.4rem;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.stepper-btn:active { background: var(--main); color: var(--white); }
.stepper-value {
  font-size: 1.5rem;
  font-weight: 700;
  min-width: 40px;
  text-align: center;
}
.stepper-unit {
  font-size: 0.9rem;
  color: var(--text-light);
}

/* ========== FACILITY LIST ========== */
.tabs {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 16px 0;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0;
  padding: 10px 16px;
  border-radius: 24px;
  border: 2px solid var(--border);
  background: var(--white);
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-light);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.tab.active {
  background: var(--main);
  border-color: var(--main);
  color: var(--white);
}
.tab:active { transform: scale(0.96); }

.facility-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 18px;
  box-shadow: var(--shadow);
  margin-bottom: 12px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: flex-start;
  gap: 14px;
}
.facility-card:hover { box-shadow: var(--shadow-hover); }
.facility-card:active { transform: scale(0.98); }
.facility-icon {
  font-size: 2rem;
  flex-shrink: 0;
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  border-radius: 12px;
}
.facility-info { flex: 1; }
.facility-name {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}
.facility-meta {
  font-size: 0.85rem;
  color: var(--text-muted);
}
.facility-price {
  font-size: 1rem;
  font-weight: 700;
  color: var(--accent-dark);
  margin-top: 4px;
}
.facility-arrow {
  flex-shrink: 0;
  color: var(--text-muted);
  font-size: 1.2rem;
  align-self: center;
}

/* Room list within facility */
.room-card {
  background: var(--white);
  border-radius: var(--radius-sm);
  padding: 16px;
  margin-bottom: 10px;
  border: 2px solid var(--border);
  cursor: pointer;
  transition: all 0.2s;
}
.room-card:hover { border-color: var(--main); }
.room-card:active { transform: scale(0.98); }
.room-card.selected { border-color: var(--main); background: #f0f7fa; }
.room-name { font-weight: 700; font-size: 1rem; }
.room-detail {
  font-size: 0.85rem;
  color: var(--text-light);
  margin-top: 4px;
}
.room-price {
  font-size: 1rem;
  font-weight: 700;
  color: var(--accent-dark);
  margin-top: 4px;
}

/* ========== PLAN CARD ========== */
.plan-card {
  background: var(--white);
  border-radius: var(--radius-sm);
  padding: 16px;
  margin-bottom: 10px;
  border: 2px solid var(--border);
  cursor: pointer;
  transition: all 0.2s;
}
.plan-card:hover { border-color: var(--main); }
.plan-card:active { transform: scale(0.98); }
.plan-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 6px;
}
.plan-name { font-weight: 700; font-size: 1rem; }
.plan-detail {
  font-size: 0.85rem;
  color: var(--text-light);
  margin-top: 4px;
}
.plan-price {
  font-size: 1rem;
  font-weight: 700;
  color: var(--accent-dark);
  margin-top: 4px;
}

/* ========== TIME SLOT PICKER ========== */
.timeslot-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin: 12px 0;
}
.timeslot {
  min-height: 48px;
  border-radius: var(--radius-sm);
  border: 2px solid var(--border);
  background: var(--white);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  padding: 8px 4px;
  text-align: center;
  line-height: 1.3;
}
.timeslot:hover { border-color: var(--main); }
.timeslot.selected {
  background: var(--main);
  border-color: var(--main);
  color: var(--white);
}
.timeslot.unavailable {
  background: #f0eded;
  color: var(--text-muted);
  cursor: not-allowed;
  border-color: transparent;
  text-decoration: line-through;
}
.timeslot-price {
  font-size: 0.75rem;
  opacity: 0.85;
  margin-top: 2px;
}

/* Hourly time grid */
.hourly-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin: 12px 0;
}
.hourly-slot {
  min-height: 44px;
  border-radius: var(--radius-sm);
  border: 2px solid var(--border);
  background: var(--white);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.hourly-slot:hover { border-color: var(--main); }
.hourly-slot.selected {
  background: var(--main);
  border-color: var(--main);
  color: var(--white);
}
.hourly-slot.unavailable {
  background: #f0eded;
  color: var(--text-muted);
  cursor: not-allowed;
  border-color: transparent;
}

/* Night picker for stays */
.night-info {
  background: #fdf6e9;
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin: 12px 0;
  border: 1px solid #f0deb8;
  font-size: 0.95rem;
}

/* Toggle switch for resident */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
}
.toggle-label {
  font-size: 0.95rem;
  font-weight: 600;
}
.toggle-switch {
  position: relative;
  width: 52px;
  height: 28px;
  cursor: pointer;
}
.toggle-switch input { display: none; }
.toggle-slider {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--border);
  border-radius: 28px;
  transition: 0.3s;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  width: 22px; height: 22px;
  left: 3px; bottom: 3px;
  background: var(--white);
  border-radius: 50%;
  transition: 0.3s;
}
.toggle-switch input:checked + .toggle-slider {
  background: var(--main);
}
.toggle-switch input:checked + .toggle-slider::before {
  transform: translateX(24px);
}
.toggle-status {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-left: 8px;
}

/* ========== PRICE BREAKDOWN CARD (accommodation) ========== */
.price-breakdown {
  background: var(--white);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  margin: 16px 0;
  border: 2px solid var(--main-light);
}
.price-breakdown-title {
  font-size: 1rem;
  font-weight: 700;
  color: var(--main-dark);
  margin-bottom: 12px;
}
.price-row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  font-size: 0.95rem;
}
.price-row-label { color: var(--text-light); }
.price-row-value { font-weight: 600; }
.price-divider {
  border: none;
  border-top: 1px dashed var(--border);
  margin: 8px 0;
}
.price-subtotal {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  font-size: 1rem;
  font-weight: 600;
}
.price-nights-multiply {
  text-align: center;
  font-size: 0.9rem;
  color: var(--text-light);
  padding: 4px 0;
}
.price-grand-total {
  display: flex;
  justify-content: space-between;
  padding: 12px 0 0;
  margin-top: 8px;
  border-top: 2px solid var(--text);
  font-size: 1.2rem;
  font-weight: 700;
}
.price-grand-total-value { color: var(--danger); }

/* Warning message */
.warning-msg {
  background: #fff3e0;
  border: 1px solid #ffcc80;
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 0.85rem;
  color: #e65100;
  font-weight: 600;
  margin: 8px 0;
}

/* ========== CONFIRM SCREEN ========== */
.summary-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
}
.summary-row {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.95rem;
}
.summary-row:last-child { border-bottom: none; }
.summary-label { color: var(--text-light); }
.summary-value { font-weight: 600; text-align: right; max-width: 60%; }
.summary-total {
  display: flex;
  justify-content: space-between;
  padding: 16px 0 0;
  margin-top: 8px;
  border-top: 2px solid var(--text);
  font-size: 1.2rem;
  font-weight: 700;
}
.summary-total-price { color: var(--danger); }

/* Form inputs in confirm */
.confirm-form { margin-bottom: 20px; }

/* ========== DONE SCREEN ========== */
.done-icon {
  text-align: center;
  font-size: 4rem;
  margin: 40px 0 16px;
}
.done-title {
  text-align: center;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--success);
  margin-bottom: 8px;
}
.done-desc {
  text-align: center;
  font-size: 0.95rem;
  color: var(--text-light);
  margin-bottom: 24px;
}
.done-id {
  text-align: center;
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 24px;
}

/* ========== AVAILABILITY BADGE ========== */
.avail-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 0.75rem;
  font-weight: 700;
}
.avail-badge.ok { background: #e8f5e9; color: #2e7d32; }
.avail-badge.few { background: #fff3e0; color: #e65100; }
.avail-badge.none { background: #fce4ec; color: #c62828; }

/* ========== OPTIONS (camp extras etc) ========== */
.option-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.option-row:last-child { border-bottom: none; }

/* ========== UTILITY ========== */
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
.mt-24 { margin-top: 24px; }
.mb-16 { margin-bottom: 16px; }
.text-center { text-align: center; }
.text-muted { color: var(--text-muted); font-size: 0.85rem; }
.gap-8 { gap: 8px; }

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
}
.empty-state-icon { font-size: 3rem; margin-bottom: 12px; }

/* ========== RESPONSIVE ========== */
@media (min-width: 481px) {
  .app {
    box-shadow: 0 0 40px rgba(0,0,0,0.08);
  }
}
</style>
</head>
<body>

<div class="app" id="app">

  <!-- ========== HEADER ========== -->
  <div class="header">
    <button class="header-back hidden" id="backBtn" onclick="goBack()">&#8592;</button>
    <div class="header-logo">ふたみ潮風ふれあい公園</div>
    <div class="header-sub">オンライン予約</div>
  </div>

  <!-- ========== TOP SCREEN ========== -->
  <div class="screen active" id="screen-top">
    <div class="top-hero">
      <div class="top-hero-icon">&#127754;</div>
      <div class="top-hero-title">ご予約はこちら</div>
      <div class="top-hero-desc">愛媛県伊予市 双海の海辺でリフレッシュ</div>
    </div>

    <div class="top-actions">
      <div class="top-action-card" onclick="navigate('screen-date-search')">
        <span class="top-action-icon">&#128197;</span>
        <span class="top-action-label">日付から探す</span>
        <span class="top-action-desc">空いている施設を表示</span>
      </div>
      <div class="top-action-card" onclick="showFacilityList()">
        <span class="top-action-icon">&#127968;</span>
        <span class="top-action-label">施設から探す</span>
        <span class="top-action-desc">施設一覧から選択</span>
      </div>
    </div>

    <div class="info-section">
      <div class="info-title">&#9432; 施設情報</div>
      <div class="info-row">
        <span class="info-label">営業時間</span>
        <span class="info-value">8:30 - 22:00</span>
      </div>
      <div class="info-row">
        <span class="info-label">定休日</span>
        <span class="info-value">毎週火曜日</span>
      </div>
      <div class="info-row">
        <span class="info-label">住所</span>
        <span class="info-value">愛媛県伊予市双海町</span>
      </div>
      <div class="info-row">
        <span class="info-label">電話</span>
        <span class="info-value">089-986-0522</span>
      </div>
    </div>
  </div>

  <!-- ========== DATE SEARCH SCREEN ========== -->
  <div class="screen" id="screen-date-search">
    <div class="section-title">&#128197; 日付と人数を選択</div>

    <div class="card">
      <div class="form-group">
        <label class="form-label" for="search-date">ご利用日</label>
        <input type="date" class="form-input" id="search-date">
      </div>
      <div class="form-group">
        <label class="form-label">ご利用人数</label>
        <div class="stepper">
          <button class="stepper-btn" onclick="stepGuests(-1)">-</button>
          <span class="stepper-value" id="guest-count">2</span>
          <span class="stepper-unit">名</span>
          <button class="stepper-btn" onclick="stepGuests(1)">+</button>
        </div>
      </div>

/* ================================================================
   NAVIGATION
   ================================================================ */
function navigate(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const target = document.getElementById(screenId);
  if (target) target.classList.add('active');

  if (screenId === 'screen-top') {
    state.screenHistory = ['screen-top'];
  } else {
    state.screenHistory.push(screenId);
  }
  updateBackButton();
  window.scrollTo(0, 0);
}

function goBack() {
  if (state.screenHistory.length > 1) {
    state.screenHistory.pop();
    const prev = state.screenHistory[state.screenHistory.length - 1];
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(prev).classList.add('active');
    updateBackButton();
    window.scrollTo(0, 0);
  }
}

function updateBackButton() {
  const btn = document.getElementById('backBtn');
  if (state.screenHistory.length > 1) {
    btn.classList.remove('hidden');
  } else {
    btn.classList.add('hidden');
  }
}

/* ================================================================
   SLOT-BASED AVAILABILITY
   同じ部屋の宿泊/日帰りがスロットを共有するため、
   あるプランが使うスロットが全て空いているかを判定する
   ================================================================ */

// ダミー: ハッシュベースで空き/埋まりを生成
function hashCode(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = ((hash << 5) - hash) + str.charCodeAt(i);
    hash |= 0;
  }
  return Math.abs(hash);
}

// 特定の部屋+日付+時間スロットが空いているか
function isSlotFree(roomId, date, hour) {
  const seed = hashCode(roomId + date + hour);
  return (seed % 10) > 2; // 約70%空き
}

// プランの全スロットが空いているか（指定部屋）
function isPlanAvailableForRoom(plan, roomId, date) {
  if (!date) return true;
  const slots = Array.isArray(plan.slots) ? plan.slots : [];
  if (slots.length === 0) return true;
  // 宿泊は翌日にまたがるスロット(0-9)も考慮
  for (const h of slots) {
    if (!isSlotFree(roomId, date, h)) return false;
  }
  return true;
}

// プランに使える部屋のうち、空いている部屋IDリストを返す
function getAvailableRooms(plan, date) {
  if (!date) return plan.rooms;
  return plan.rooms.filter(rid => isPlanAvailableForRoom(plan, rid, date));
}

function getAvailabilityLevel(plan, date) {
  if (!date) return 'ok';
  const available = getAvailableRooms(plan, date);
  if (available.length === 0) return 'none';
  if (available.length <= 1) return 'few';
  return 'ok';
}

function availBadge(level) {
  const labels = { ok: '空きあり', few: '残りわずか', none: '満室' };
  return '<span class="avail-badge ' + level + '">' + labels[level] + '</span>';
}

/* ================================================================
   PRICE HELPERS
   ================================================================ */
function getPlanDisplayPrice(plan) {
  if (plan.id === 'tennis') {
    return state.isResident ? plan.residentPrice : plan.nonResidentPrice;
  }
  if (plan.id.startsWith('midori')) {
    if (state.isStudent) {
      return state.isResident ? (plan.studentPrice || plan.basePrice) : (plan.studentNonResidentPrice || plan.nonResidentPrice || plan.basePrice);
    }
    return state.isResident ? plan.basePrice : (plan.nonResidentPrice || plan.basePrice);
  }
  return plan.basePrice;
}

   ================================================================ */
function stepGuests(delta) {
  state.searchGuests = Math.max(1, Math.min(50, state.searchGuests + delta));
  document.getElementById('guest-count').textContent = state.searchGuests;
}

/* ================================================================

   ================================================================ */
function searchByDate() {
  const dateInput = document.getElementById('search-date');
  if (!dateInput.value) {
    alert('日付を選択してください');
    return;
  }
  state.searchDate = dateInput.value;
  state.guests = state.searchGuests;
  state.flow = 'date';

  const resultsEl = document.getElementById('date-search-results');
  const dateStr = formatDate(state.searchDate);
  let html = '<div class="section-title">' + dateStr + ' の空きプラン</div>';

  let found = false;
  PLANS.forEach(plan => {
    // 人数チェック: プランに紐づく部屋の最大定員
    const maxCap = Math.max(...plan.rooms.map(rid => {
      const r = ROOMS.find(x => x.id === rid);
      return r ? r.capacity : 0;
    }));
    if (maxCap < state.searchGuests) return;

    const level = getAvailabilityLevel(plan, state.searchDate);
    found = true;
    const room = ROOMS.find(r => r.id === plan.rooms[0]);
    html += '<div class="facility-card" onclick="selectPlanFromSearch(\'' + plan.id + '\')">';
    html += '  <div class="facility-icon">' + (room ? room.icon : '') + '</div>';
    html += '  <div class="facility-info">';
    html += '    <div><span class="plan-badge" style="background:' + (plan.badgeColor || '#999') + '">' + (plan.badge || '') + '</span></div>';
    html += '    <div class="facility-name">' + plan.name + '</div>';
    html += '    <div class="facility-meta">定員' + maxCap + '名</div>';
    html += '    <div class="facility-price">' + plan.priceDisplay + ' ' + availBadge(level) + '</div>';
    html += '  </div>';
    html += '  <div class="facility-arrow">&#8250;</div>';
    html += '</div>';
  });

  if (!found) {
    html += '<div class="empty-state"><div class="empty-state-icon">&#128533;</div><div>' + state.searchGuests + '名でご利用可能なプランが見つかりません</div></div>';
  }

  resultsEl.innerHTML = html;

/* ================================================================
   AGE GROUP STEPPERS (accommodation plans only)
   ================================================================ */
function stepAgeGroup(group, delta) {
  const plan = state.selectedPlan;
  const room = ROOMS.find(r => r.id === state.selectedRoomId);
  const maxCap = room ? room.capacity : 50;

  if (group === 'adult') {
    state.guestsAdult = Math.max(0, state.guestsAdult + delta);
  } else if (group === 'child') {
    state.guestsChild = Math.max(0, state.guestsChild + delta);
  } else if (group === 'infant') {
    state.guestsInfant = Math.max(0, state.guestsInfant + delta);
  }

  const total = state.guestsAdult + state.guestsChild + state.guestsInfant;

  // 6畳の3名制限チェック
  const warningEl = document.getElementById('capacity-warning');
  if (warningEl) {
    if (plan.id === 'stay_6' && total > maxCap) {
      warningEl.style.display = 'block';
      warningEl.textContent = '6畳は' + maxCap + '名までです。合計が' + total + '名になっています。';
    } else {
      warningEl.style.display = 'none';
    }
  }

  // UI更新
  const adultEl = document.getElementById('guests-adult');
  const childEl = document.getElementById('guests-child');
  const infantEl = document.getElementById('guests-infant');
  if (adultEl) adultEl.textContent = state.guestsAdult;
  if (childEl) childEl.textContent = state.guestsChild;
  if (infantEl) infantEl.textContent = state.guestsInfant;

  updateStayPriceBreakdown();
  updateBookingPriceSummary();
}

/* ================================================================
   STAY PRICE BREAKDOWN (accommodation plans only)
   Real-time pricing breakdown card
   ================================================================ */
function updateStayPriceBreakdown() {
  const container = document.getElementById('price-breakdown-container');
  if (!container) return;
  const plan = state.selectedPlan;
  if (!plan || plan.planType !== 'stay') { container.innerHTML = ''; return; }

  const totalGuests = state.guestsAdult + state.guestsChild + state.guestsInfant;
  if (totalGuests === 0 && state.selectedNights > 0) {
    container.innerHTML = '<div class="text-muted mt-8">人数を入力すると料金明細が表示されます</div>';
    return;
  }

  const room = ROOMS.find(r => r.id === state.selectedRoomId);
  const roomLabel = room ? room.name : '';

  const baseCost = plan.basePrice;
  const adultCost = plan.extraAdult * state.guestsAdult;
  const childCost = plan.extraChild * state.guestsChild;
  const infantCost = plan.extraInfant * state.guestsInfant;
  const perNight = baseCost + adultCost + childCost + infantCost;
  const grandTotal = perNight * state.selectedNights;

  let html = '<div class="price-breakdown">';
  html += '<div class="price-breakdown-title">料金明細</div>';

  // 基本料金
  html += '<div class="price-row"><span class="price-row-label">基本料金（' + roomLabel + ' x 1泊）</span><span class="price-row-value">' + baseCost.toLocaleString() + '円</span></div>';

  // 年齢区分
  html += '<div class="price-row"><span class="price-row-label">中学生以上 x ' + state.guestsAdult + '人</span><span class="price-row-value">' + adultCost.toLocaleString() + '円</span></div>';
  html += '<div class="price-row"><span class="price-row-label">小学生 x ' + state.guestsChild + '人</span><span class="price-row-value">' + childCost.toLocaleString() + '円</span></div>';
  html += '<div class="price-row"><span class="price-row-label">小学生未満 x ' + state.guestsInfant + '人</span><span class="price-row-value">' + infantCost.toLocaleString() + '円</span></div>';

  html += '<hr class="price-divider">';
  html += '<div class="price-subtotal"><span>合計（1泊）</span><span>' + perNight.toLocaleString() + '円</span></div>';

  if (state.selectedNights > 1) {
    html += '<div class="price-nights-multiply">x ' + state.selectedNights + '泊</div>';
    html += '<hr class="price-divider">';
  }

  html += '<div class="price-grand-total"><span>総合計</span><span class="price-grand-total-value">' + grandTotal.toLocaleString() + '円</span></div>';
  html += '</div>';

  container.innerHTML = html;
}

/* ================================================================
   EXTRAS RENDERING
   ================================================================ */
function renderExtras(plan) {
  let html = '';
  plan.extras.forEach(extra => {
    html += '<div class="form-group">';
    html += '<label class="form-label">' + extra.name + ' (' + extra.price.toLocaleString() + '円/' + extra.unit + ')</label>';
    html += '<div class="stepper">';
    html += '<button class="stepper-btn" onclick="stepExtra(\'' + extra.id + '\', -1)">-</button>';
    html += '<span class="stepper-value" id="extra-' + extra.id + '-count">' + getExtraCount(extra.id) + '</span>';
    html += '<span class="stepper-unit">' + extra.unit + '</span>';
    html += '<button class="stepper-btn" onclick="stepExtra(\'' + extra.id + '\', 1)">+</button>';
    html += '</div></div>';
  });
  return html;
}

function getExtraCount(extraId) {
  if (extraId === 'tent') return state.campTents;
  if (extraId === 'sheet') return state.lodgeSheets;
  if (extraId === 'towel') return state.saunaTowels;
  return 0;
}

function stepExtra(extraId, delta) {
  if (extraId === 'tent') {
    state.campTents = Math.max(0, Math.min(20, state.campTents + delta));
    const el = document.getElementById('extra-tent-count');
    if (el) el.textContent = state.campTents;
  }
  if (extraId === 'sheet') {
    state.lodgeSheets = Math.max(0, Math.min(10, state.lodgeSheets + delta));
    const el = document.getElementById('extra-sheet-count');
    if (el) el.textContent = state.lodgeSheets;
  }
  if (extraId === 'towel') {
    state.saunaTowels = Math.max(0, Math.min(8, state.saunaTowels + delta));
    const el = document.getElementById('extra-towel-count');
    if (el) el.textContent = state.saunaTowels;
  }
  updateSimplePriceInfo();
  updateBookingPriceSummary();
}

/* ================================================================
   COMMON STEPPERS
   ================================================================ */
function stepBookingGuests(delta) {
  const room = ROOMS.find(r => r.id === state.selectedRoomId);
  const max = room ? room.capacity : 50;
  state.guests = Math.max(1, Math.min(max, state.guests + delta));
  const el = document.getElementById('booking-guest-count');
  if (el) el.textContent = state.guests;
  updateBookingPriceSummary();
}

function stepNights(delta) {
  state.selectedNights = Math.max(1, Math.min(14, state.selectedNights + delta));
  const el = document.getElementById('nights-count');
  if (el) el.textContent = state.selectedNights;
  updateSimplePriceInfo();
  updateStayPriceBreakdown();
  updateBookingPriceSummary();
}

function stepCampSites(delta) {
  state.campSites = Math.max(1, Math.min(10, state.campSites + delta));
  const el = document.getElementById('camp-sites-count');
  if (el) el.textContent = state.campSites;
  updateSimplePriceInfo();
  updateBookingPriceSummary();
}

/* ================================================================
   BOOKING DATE CHANGE
   ================================================================ */
function onBookingDateChange() {
  const dateInput = document.getElementById('booking-date');
  state.selectedDate = dateInput ? dateInput.value : '';
  state.selectedHours = [];

  const plan = state.selectedPlan;
  if (!plan) return;
  const pt = plan.planType;

  if (pt === 'hourly' && state.selectedDate) renderHourlyGrid();
  if (pt === 'stay' || pt === 'stay_simple' || pt === 'camp') updateSimplePriceInfo();
  if (pt === 'stay') updateStayPriceBreakdown();
  updateBookingPriceSummary();
}

/* ================================================================
   HOURLY GRID (tennis, lodge day)
   ================================================================ */
function renderHourlyGrid() {
  const grid = document.getElementById('hourly-grid');
  if (!grid) return;
  const plan = state.selectedPlan;
  const roomId = state.selectedRoomId;
  const date = state.selectedDate;
  const range = plan.hourlyRange || { start: 8, end: 22 };

  let html = '';
  for (let h = range.start; h < range.end; h++) {
    const avail = isSlotFree(roomId, date, h);
    const cls = avail ? '' : ' unavailable';
    const sel = state.selectedHours.includes(h) ? ' selected' : '';
    const label = (h < 10 ? '0' : '') + h + ':00';
    html += '<div class="hourly-slot' + cls + sel + '" onclick="toggleHour(' + h + ', this, ' + avail + ')">' + label + '</div>';
  }
  grid.innerHTML = html;
}

function toggleHour(hour, el, avail) {
  if (!avail) return;
  const idx = state.selectedHours.indexOf(hour);
  if (idx >= 0) {
    state.selectedHours.splice(idx, 1);
    el.classList.remove('selected');
  } else {
    state.selectedHours.push(hour);
    el.classList.add('selected');
  }
  updateBookingPriceSummary();
}

/* ================================================================
   SIMPLE PRICE INFO (non-accommodation)
   ================================================================ */
function updateSimplePriceInfo() {
  const el = document.getElementById('stay-price-info');
  if (!el) return;
  const plan = state.selectedPlan;
  if (!plan) return;
  const pt = plan.planType;

  if (pt === 'stay_simple') {
    let total = plan.basePrice * state.selectedNights;
    let info = plan.basePrice.toLocaleString() + '円 x ' + state.selectedNights + '泊 = <strong>' + total.toLocaleString() + '円</strong>';
    if (plan.extras) {
      let extTotal = 0;
      plan.extras.forEach(ex => { extTotal += ex.price * getExtraCount(ex.id); });
      if (extTotal > 0) info += '<br>オプション: +' + extTotal.toLocaleString() + '円';
    }
    el.innerHTML = info;
  }

  if (pt === 'camp') {
    const siteTotal = plan.basePrice * state.campSites * state.selectedNights;
    const tentTotal = state.campTents * 50;
    const total = siteTotal + tentTotal;
    let info = plan.basePrice.toLocaleString() + '円 x ' + state.campSites + '区画 x ' + state.selectedNights + '泊 = ' + siteTotal.toLocaleString() + '円';
    if (tentTotal > 0) info += '<br>テント追加: 50円 x ' + state.campTents + '張 = ' + tentTotal.toLocaleString() + '円';
    info += '<br><strong>合計: ' + total.toLocaleString() + '円</strong>';
    el.innerHTML = info;
  }
}

/* ================================================================
   TOTAL PRICE CALCULATION
   ================================================================ */
function calculateTotal() {
  const plan = state.selectedPlan;
  if (!plan) return 0;
  const pt = plan.planType;

  if (pt === 'stay') {
    // 宿泊: 基本料金 + 年齢区分加算 x 泊数
    const baseCost = plan.basePrice;
    const adultCost = plan.extraAdult * state.guestsAdult;
    const childCost = plan.extraChild * state.guestsChild;
    const infantCost = plan.extraInfant * state.guestsInfant;
    return (baseCost + adultCost + childCost + infantCost) * state.selectedNights;
  }

  if (pt === 'stay_simple') {
    let total = plan.basePrice * state.selectedNights;
    if (plan.extras) {
      plan.extras.forEach(ex => { total += ex.price * getExtraCount(ex.id); });
    }
    return total;
  }

  if (pt === 'camp') {
    let total = plan.basePrice * state.campSites * state.selectedNights;
    total += state.campTents * 50;
    return total;
  }

  if (pt === 'day_all' || pt === 'day_slot') {
    return getPlanDisplayPrice(plan);
  }

  if (pt === 'hourly') {
    if (plan.id === 'tennis') {
      const courtPrice = state.isResident ? plan.residentPrice : plan.nonResidentPrice;
      const lightPrice = state.isResident ? plan.lightResident : plan.lightNonResident;
      let total = 0;
      state.selectedHours.forEach(h => {
        total += courtPrice;
        if (h >= 17) total += lightPrice;
      });
      return total;
    }
    return plan.basePrice * state.selectedHours.length;
  }

  if (pt === 'sauna') {
    let total = plan.basePrice;
    total += state.saunaTowels * 550;
    return total;
  }

  return 0;
}

function updateBookingPriceSummary() {
  const el = document.getElementById('booking-price-summary');
  if (!el) return;
  const plan = state.selectedPlan;
  if (!plan) return;

  // 宿泊プランは独自の料金明細カードで表示するので、サマリーバーは非表示
  if (plan.planType === 'stay') {
    const total = calculateTotal();
    if (total > 0) {
      el.style.display = 'block';
      el.innerHTML = '<div style="display:flex;justify-content:space-between;font-size:1.1rem"><span style="font-weight:600">総合計</span><span style="font-weight:700;color:var(--danger)">' + total.toLocaleString() + '円</span></div>';
    } else {
      el.style.display = 'none';
    }
    return;
  }

  const total = calculateTotal();
  if (total > 0) {
    el.style.display = 'block';
    el.innerHTML = '<div style="display:flex;justify-content:space-between;font-size:1.1rem"><span style="font-weight:600">合計金額</span><span style="font-weight:700;color:var(--danger)">' + total.toLocaleString() + '円</span></div>';
  } else {
    el.style.display = 'none';
  }
}

/* ================================================================
   CONFIRM SCREEN
   ================================================================ */
function proceedToConfirm() {
  if (!state.selectedDate) {
    alert('日付を選択してください');
    return;
  }
  const plan = state.selectedPlan;
  const pt = plan.planType;

  // バリデーション
  if (pt === 'stay') {
    const total = state.guestsAdult + state.guestsChild + state.guestsInfant;
    if (total === 0) {
      alert('人数を入力してください');
      return;
    }
    const room = ROOMS.find(r => r.id === state.selectedRoomId);
    if (plan.id === 'stay_6' && room && total > room.capacity) {
      alert('6畳は' + room.capacity + '名までです。');
      return;
    }
  }
  if (pt === 'hourly' && state.selectedHours.length === 0) {
    alert('時間帯を選択してください');
    return;
  }

  const room = ROOMS.find(r => r.id === state.selectedRoomId);
  const total = calculateTotal();
  const dateStr = formatDate(state.selectedDate);

  // 時間帯文字列
  let timeStr = '';
  if (pt === 'stay' || pt === 'stay_simple') {
    const checkout = addDays(state.selectedDate, state.selectedNights);
    timeStr = dateStr + ' ' + plan.checkin + ' ~ ' + formatDate(checkout) + ' ' + plan.checkout + '（' + state.selectedNights + '泊）';
  } else if (pt === 'camp') {
    const checkout = addDays(state.selectedDate, state.selectedNights);
    timeStr = dateStr + ' ' + plan.checkin + ' ~ ' + formatDate(checkout) + ' ' + plan.checkout + '（' + state.selectedNights + '泊）';
  } else if (pt === 'day_all' || pt === 'day_slot') {
    timeStr = dateStr + ' ' + (plan.timeRange || '');
  } else if (pt === 'hourly') {
    const sorted = [...state.selectedHours].sort((a, b) => a - b);
    const labels = sorted.map(h => (h < 10 ? '0' : '') + h + ':00');
    timeStr = dateStr + ' ' + labels.join(', ');
  } else if (pt === 'sauna') {
    timeStr = dateStr + ' ' + plan.timeRange;
  }

  const summaryEl = document.getElementById('booking-summary');
  let html = '';
  html += '<div class="summary-row"><span class="summary-label">プラン</span><span class="summary-value">' + plan.name + '</span></div>';
  html += '<div class="summary-row"><span class="summary-label">部屋</span><span class="summary-value">' + (room ? room.fullName : '') + '</span></div>';
  html += '<div class="summary-row"><span class="summary-label">日時</span><span class="summary-value">' + timeStr + '</span></div>';

  if (pt === 'stay') {
    const totalGuests = state.guestsAdult + state.guestsChild + state.guestsInfant;
    html += '<div class="summary-row"><span class="summary-label">人数</span><span class="summary-value">' + totalGuests + '名（中学生以上' + state.guestsAdult + ', 小学生' + state.guestsChild + ', 小学生未満' + state.guestsInfant + '）</span></div>';
  }
  if (pt === 'sauna') {
    html += '<div class="summary-row"><span class="summary-label">人数</span><span class="summary-value">' + state.guests + '名</span></div>';
  }
  if (pt === 'camp') {
    html += '<div class="summary-row"><span class="summary-label">区画数</span><span class="summary-value">' + state.campSites + '区画</span></div>';
    if (state.campTents > 0) {
      html += '<div class="summary-row"><span class="summary-label">テント追加</span><span class="summary-value">' + state.campTents + '張</span></div>';
    }
  }
  if (plan.id === 'tennis' || plan.id.startsWith('midori')) {
    html += '<div class="summary-row"><span class="summary-label">利用者区分</span><span class="summary-value">' + (state.isResident ? '伊予市民' : '市外') + (state.isStudent ? '（学生）' : '') + '</span></div>';
  }

  // オプション
  if (plan.extras) {
    plan.extras.forEach(ex => {
      const cnt = getExtraCount(ex.id);
      if (cnt > 0) {
        html += '<div class="summary-row"><span class="summary-label">' + ex.name + '</span><span class="summary-value">' + cnt + ex.unit + ' (' + (ex.price * cnt).toLocaleString() + '円)</span></div>';
      }
    });
  }

  html += '<div class="summary-total"><span>合計</span><span class="summary-total-price">' + total.toLocaleString() + '円</span></div>';
  summaryEl.innerHTML = html;

  state.totalPrice = total;
  state.timeStr = timeStr;

  navigate('screen-confirm');
}

function submitBooking() {
  const name = document.getElementById('confirm-name').value.trim();
  const phone = document.getElementById('confirm-phone').value.trim();
  const email = document.getElementById('confirm-email').value.trim();
  const note = document.getElementById('confirm-note').value.trim();

  if (!name) { alert('お名前を入力してください'); return; }
  if (!phone) { alert('電話番号を入力してください'); return; }

  const bookingId = 'FTM-' + Date.now().toString(36).toUpperCase();
  const plan = state.selectedPlan;

  const booking = {
    id: bookingId,
    planId: plan.id,
    planName: plan.name,
    planType: plan.planType,
    roomId: state.selectedRoomId,
    roomName: (ROOMS.find(r => r.id === state.selectedRoomId) || {}).fullName || '',
    date: state.selectedDate,
    nights: state.selectedNights,
    guestsAdult: state.guestsAdult,
    guestsChild: state.guestsChild,
    guestsInfant: state.guestsInfant,
    guests: state.guests,
    campSites: state.campSites,
    campTents: state.campTents,
    lodgeSheets: state.lodgeSheets,
    saunaTowels: state.saunaTowels,
    selectedHours: state.selectedHours,
    isResident: state.isResident,
    isStudent: state.isStudent,
    total: state.totalPrice,
    timeStr: state.timeStr,
    name: name,
    phone: phone,
    email: email,
    note: note,
    createdAt: new Date().toISOString(),
  };

  const bookings = JSON.parse(localStorage.getItem('futami_bookings') || '[]');
  bookings.push(booking);
  localStorage.setItem('futami_bookings', JSON.stringify(bookings));

  document.getElementById('done-booking-id').textContent = '予約番号: ' + bookingId;

  const doneSummary = document.getElementById('done-summary');
  let html = '';
  html += '<div class="summary-row"><span class="summary-label">プラン</span><span class="summary-value">' + booking.planName + '</span></div>';
  html += '<div class="summary-row"><span class="summary-label">部屋</span><span class="summary-value">' + booking.roomName + '</span></div>';
  html += '<div class="summary-row"><span class="summary-label">日時</span><span class="summary-value">' + booking.timeStr + '</span></div>';
  html += '<div class="summary-row"><span class="summary-label">お名前</span><span class="summary-value">' + booking.name + '</span></div>';
  html += '<div class="summary-row"><span class="summary-label">電話番号</span><span class="summary-value">' + booking.phone + '</span></div>';
  if (booking.email) {
    html += '<div class="summary-row"><span class="summary-label">メール</span><span class="summary-value">' + booking.email + '</span></div>';
  }
  html += '<div class="summary-total"><span>合計金額</span><span class="summary-total-price">' + booking.total.toLocaleString() + '円</span></div>';
  doneSummary.innerHTML = html;

  document.getElementById('confirm-name').value = '';
  document.getElementById('confirm-phone').value = '';
  document.getElementById('confirm-email').value = '';
  document.getElementById('confirm-note').value = '';

  navigate('screen-done');
}

/* ================================================================
   UTILS
   ================================================================ */
function getTodayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const days = ['日', '月', '火', '水', '木', '金', '土'];
  return (d.getMonth() + 1) + '月' + d.getDate() + '日(' + days[d.getDay()] + ')';
}

function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

/* ================================================================
   INIT
   ================================================================ */
document.addEventListener('DOMContentLoaded', function() {
  const searchDate = document.getElementById('search-date');
  searchDate.min = getTodayStr();
  searchDate.value = getTodayStr();
});
</script>
