<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ふたみ潮風ふれあい公園 予約システム</title>
<style>
/* ========== RESET & BASE ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --main: #7EAEC2;
  --main-dark: #5a8fa8;
  --main-light: #b5d4e2;
  --accent: #D4A047;
  --accent-dark: #b8872e;
  --bg: #F5F0EB;
  --white: #ffffff;
  --text: #333333;
  --text-light: #666666;
  --text-muted: #999999;
  --border: #e0d8d0;
  --danger: #e05555;
  --success: #4caf50;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-hover: 0 4px 20px rgba(0,0,0,0.12);
  --radius: 16px;
  --radius-sm: 10px;
  --max-width: 480px;
}

html { font-size: 16px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Segoe UI", Meiryo, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ========== LAYOUT ========== */
.app {
  max-width: var(--max-width);
  margin: 0 auto;
  min-height: 100vh;
  background: var(--bg);
  position: relative;
}

.screen {
  display: none;
  padding: 0 16px 100px;
  animation: fadeIn 0.3s ease;
}
.screen.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ========== HEADER ========== */
.header {
  background: linear-gradient(135deg, var(--main) 0%, var(--main-dark) 100%);
  color: var(--white);
  padding: 20px 16px 16px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.header-logo {
  font-size: 1.3rem;
  font-weight: 700;
  letter-spacing: 0.05em;
}
.header-sub {
  font-size: 0.8rem;
  opacity: 0.9;
  margin-top: 2px;
}

/* Back button in header */
.header-back {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--white);
  font-size: 1.5rem;
  cursor: pointer;
  padding: 8px;
  line-height: 1;
  border-radius: 8px;
}
.header-back:active { background: rgba(255,255,255,0.2); }
.header-back.hidden { display: none; }

/* ========== BUTTONS ========== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 52px;
  padding: 14px 24px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 1.05rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
  width: 100%;
}
.btn:active { transform: scale(0.98); }

.btn-primary {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
  color: var(--white);
  box-shadow: 0 3px 12px rgba(212,160,71,0.3);
}
.btn-primary:hover { box-shadow: 0 4px 16px rgba(212,160,71,0.4); }

.btn-secondary {
  background: var(--white);
  color: var(--main-dark);
  border: 2px solid var(--main);
}
.btn-secondary:hover { background: var(--main-light); color: var(--white); border-color: var(--main-light); }

.btn-outline {
  background: transparent;
  color: var(--main-dark);
  border: 2px solid var(--border);
}
.btn-outline:hover { border-color: var(--main); }

/* ========== CARDS ========== */
.card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
  transition: box-shadow 0.2s, transform 0.2s;
}
.card-clickable { cursor: pointer; }
.card-clickable:hover { box-shadow: var(--shadow-hover); }
.card-clickable:active { transform: scale(0.98); }

/* ========== TOP SCREEN ========== */
.top-hero {
  text-align: center;
  padding: 28px 0 20px;
}
.top-hero-icon { font-size: 3rem; margin-bottom: 8px; }
.top-hero-title {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--main-dark);
  margin-bottom: 4px;
}
.top-hero-desc {
  font-size: 0.9rem;
  color: var(--text-light);
}

.top-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}
.top-action-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 24px 16px;
  text-align: center;
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: all 0.2s;
  border: 2px solid transparent;
}
.top-action-card:hover {
  box-shadow: var(--shadow-hover);
  border-color: var(--main);
}
.top-action-card:active { transform: scale(0.97); }
.top-action-icon { font-size: 2.5rem; display: block; margin-bottom: 10px; }
.top-action-label {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--text);
}
.top-action-desc {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-top: 4px;
}

/* Info section */
.info-section {
  background: var(--white);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
}
.info-title {
  font-size: 1rem;
  font-weight: 700;
  color: var(--main-dark);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.info-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.95rem;
}
.info-row:last-child { border-bottom: none; }
.info-label { color: var(--text-light); }
.info-value { font-weight: 600; }

/* ========== DATE SEARCH SCREEN ========== */
.section-title {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--text);
  margin: 24px 0 12px;
}

.form-group {
  margin-bottom: 20px;
}
.form-label {
  display: block;
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
}
.form-input {
  width: 100%;
  min-height: 52px;
  padding: 12px 16px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 1.05rem;
  color: var(--text);
  background: var(--white);
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.form-input:focus {
  outline: none;
  border-color: var(--main);
}
.form-input::placeholder { color: var(--text-muted); }

/* Number stepper */
.stepper {
  display: flex;
  align-items: center;
  gap: 16px;
}
.stepper-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 2px solid var(--main);
  background: var(--white);
  color: var(--main-dark);
  font-size: 1.4rem;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.stepper-btn:active { background: var(--main); color: var(--white); }
.stepper-value {
  font-size: 1.5rem;
  font-weight: 700;
  min-width: 40px;
  text-align: center;
}
.stepper-unit {
  font-size: 0.9rem;
  color: var(--text-light);
}

/* ========== FACILITY LIST ========== */
.tabs {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 16px 0;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0;
  padding: 10px 16px;
  border-radius: 24px;
  border: 2px solid var(--border);
  background: var(--white);
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-light);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.tab.active {
  background: var(--main);
  border-color: var(--main);
  color: var(--white);
}
.tab:active { transform: scale(0.96); }

.facility-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 18px;
  box-shadow: var(--shadow);
  margin-bottom: 12px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: flex-start;
  gap: 14px;
}
.facility-card:hover { box-shadow: var(--shadow-hover); }
.facility-card:active { transform: scale(0.98); }
.facility-icon {
  font-size: 2rem;
  flex-shrink: 0;
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  border-radius: 12px;
}
.facility-info { flex: 1; }
.facility-name {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}
.facility-meta {
  font-size: 0.85rem;
  color: var(--text-muted);
}
.facility-price {
  font-size: 1rem;
  font-weight: 700;
  color: var(--accent-dark);
  margin-top: 4px;
}
.facility-arrow {
  flex-shrink: 0;
  color: var(--text-muted);
  font-size: 1.2rem;
  align-self: center;
}

/* Room list within facility */
.room-card {
  background: var(--white);
  border-radius: var(--radius-sm);
  padding: 16px;
  margin-bottom: 10px;
  border: 2px solid var(--border);
  cursor: pointer;
  transition: all 0.2s;
}
.room-card:hover { border-color: var(--main); }
.room-card:active { transform: scale(0.98); }
.room-card.selected { border-color: var(--main); background: #f0f7fa; }
.room-name { font-weight: 700; font-size: 1rem; }
.room-detail {
  font-size: 0.85rem;
  color: var(--text-light);
  margin-top: 4px;
}
.room-price {
  font-size: 1rem;
  font-weight: 700;
  color: var(--accent-dark);
  margin-top: 4px;
}

/* ========== TIME SLOT PICKER ========== */
.timeslot-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin: 12px 0;
}
.timeslot {
  min-height: 48px;
  border-radius: var(--radius-sm);
  border: 2px solid var(--border);
  background: var(--white);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  padding: 8px 4px;
  text-align: center;
  line-height: 1.3;
}
.timeslot:hover { border-color: var(--main); }
.timeslot.selected {
  background: var(--main);
  border-color: var(--main);
  color: var(--white);
}
.timeslot.unavailable {
  background: #f0eded;
  color: var(--text-muted);
  cursor: not-allowed;
  border-color: transparent;
  text-decoration: line-through;
}
.timeslot-price {
  font-size: 0.75rem;
  opacity: 0.85;
  margin-top: 2px;
}

/* Hourly time grid */
.hourly-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin: 12px 0;
}
.hourly-slot {
  min-height: 44px;
  border-radius: var(--radius-sm);
  border: 2px solid var(--border);
  background: var(--white);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.hourly-slot:hover { border-color: var(--main); }
.hourly-slot.selected {
  background: var(--main);
  border-color: var(--main);
  color: var(--white);
}
.hourly-slot.unavailable {
  background: #f0eded;
  color: var(--text-muted);
  cursor: not-allowed;
  border-color: transparent;
}

/* Night picker for stays */
.night-info {
  background: #fdf6e9;
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin: 12px 0;
  border: 1px solid #f0deb8;
  font-size: 0.95rem;
}

/* Toggle switch for resident */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
}
.toggle-label {
  font-size: 0.95rem;
  font-weight: 600;
}
.toggle-switch {
  position: relative;
  width: 52px;
  height: 28px;
  cursor: pointer;
}
.toggle-switch input { display: none; }
.toggle-slider {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--border);
  border-radius: 28px;
  transition: 0.3s;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  width: 22px; height: 22px;
  left: 3px; bottom: 3px;
  background: var(--white);
  border-radius: 50%;
  transition: 0.3s;
}
.toggle-switch input:checked + .toggle-slider {
  background: var(--main);
}
.toggle-switch input:checked + .toggle-slider::before {
  transform: translateX(24px);
}
.toggle-status {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-left: 8px;
}

/* ========== CONFIRM SCREEN ========== */
.summary-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
}
.summary-row {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.95rem;
}
.summary-row:last-child { border-bottom: none; }
.summary-label { color: var(--text-light); }
.summary-value { font-weight: 600; text-align: right; max-width: 60%; }
.summary-total {
  display: flex;
  justify-content: space-between;
  padding: 16px 0 0;
  margin-top: 8px;
  border-top: 2px solid var(--text);
  font-size: 1.2rem;
  font-weight: 700;
}
.summary-total-price { color: var(--danger); }

/* Form inputs in confirm */
.confirm-form { margin-bottom: 20px; }

/* ========== DONE SCREEN ========== */
.done-icon {
  text-align: center;
  font-size: 4rem;
  margin: 40px 0 16px;
}
.done-title {
  text-align: center;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--success);
  margin-bottom: 8px;
}
.done-desc {
  text-align: center;
  font-size: 0.95rem;
  color: var(--text-light);
  margin-bottom: 24px;
}
.done-id {
  text-align: center;
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 24px;
}

/* ========== AVAILABILITY BADGE ========== */
.avail-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 0.75rem;
  font-weight: 700;
}
.avail-badge.ok { background: #e8f5e9; color: #2e7d32; }
.avail-badge.few { background: #fff3e0; color: #e65100; }
.avail-badge.none { background: #fce4ec; color: #c62828; }

/* ========== OPTIONS (camp extras etc) ========== */
.option-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.option-row:last-child { border-bottom: none; }

/* ========== UTILITY ========== */
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
.mt-24 { margin-top: 24px; }
.mb-16 { margin-bottom: 16px; }
.text-center { text-align: center; }
.text-muted { color: var(--text-muted); font-size: 0.85rem; }
.gap-8 { gap: 8px; }

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
}
.empty-state-icon { font-size: 3rem; margin-bottom: 12px; }

/* ========== RESPONSIVE ========== */
@media (min-width: 481px) {
  .app {
    box-shadow: 0 0 40px rgba(0,0,0,0.08);
  }
}
</style>
</head>
<body>

<div class="app" id="app">

  <!-- ========== HEADER ========== -->
  <div class="header">
    <button class="header-back hidden" id="backBtn" onclick="goBack()">&#8592;</button>
    <div class="header-logo">ふたみ潮風ふれあい公園</div>
    <div class="header-sub">オンライン予約</div>
  </div>

  <!-- ========== TOP SCREEN ========== -->
  <div class="screen active" id="screen-top">
    <div class="top-hero">
      <div class="top-hero-icon">&#127754;</div>
      <div class="top-hero-title">ご予約はこちら</div>
      <div class="top-hero-desc">愛媛県伊予市 双海の海辺でリフレッシュ</div>
    </div>

    <div class="top-actions">
      <div class="top-action-card" onclick="navigate('screen-date-search')">
        <span class="top-action-icon">&#128197;</span>
        <span class="top-action-label">日付から探す</span>
        <span class="top-action-desc">空いている施設を表示</span>
      </div>
      <div class="top-action-card" onclick="navigate('screen-facility-list')">
        <span class="top-action-icon">&#127968;</span>
        <span class="top-action-label">施設から探す</span>
        <span class="top-action-desc">施設一覧から選択</span>
      </div>
    </div>

    <div class="info-section">
      <div class="info-title">&#9432; 施設情報</div>
      <div class="info-row">
        <span class="info-label">営業時間</span>
        <span class="info-value">8:30 - 22:00</span>
      </div>
      <div class="info-row">
        <span class="info-label">定休日</span>
        <span class="info-value">毎週火曜日</span>
      </div>
      <div class="info-row">
        <span class="info-label">住所</span>
        <span class="info-value">愛媛県伊予市双海町</span>
      </div>
      <div class="info-row">
        <span class="info-label">電話</span>
        <span class="info-value">089-986-0522</span>
      </div>
    </div>
  </div>

  <!-- ========== DATE SEARCH SCREEN ========== -->
  <div class="screen" id="screen-date-search">
    <div class="section-title">&#128197; 日付と人数を選択</div>

    <div class="card">
      <div class="form-group">
        <label class="form-label" for="search-date">ご利用日</label>
        <input type="date" class="form-input" id="search-date">
      </div>
      <div class="form-group">
        <label class="form-label">ご利用人数</label>
        <div class="stepper">
          <button class="stepper-btn" onclick="stepGuests(-1)">-</button>
          <span class="stepper-value" id="guest-count">2</span>
          <span class="stepper-unit">名</span>
          <button class="stepper-btn" onclick="stepGuests(1)">+</button>
        </div>
      </div>
      <button class="btn btn-primary" onclick="searchByDate()">空き施設を検索</button>
    </div>

    <div id="date-search-results"></div>
  </div>

  <!-- ========== FACILITY LIST SCREEN ========== -->
  <div class="screen" id="screen-facility-list">
    <div class="section-title">&#127968; 施設一覧</div>

    <div class="tabs" id="facility-tabs">
      <div class="tab active" data-category="all" onclick="filterFacilities('all', this)">すべて</div>
      <div class="tab" data-category="stay" onclick="filterFacilities('stay', this)">宿泊</div>
      <div class="tab" data-category="day" onclick="filterFacilities('day', this)">日帰り</div>
      <div class="tab" data-category="outdoor" onclick="filterFacilities('outdoor', this)">アウトドア</div>
      <div class="tab" data-category="sport" onclick="filterFacilities('sport', this)">スポーツ</div>
      <div class="tab" data-category="sauna" onclick="filterFacilities('sauna', this)">サウナ</div>
    </div>

    <div id="facility-list"></div>
  </div>

  <!-- ========== FACILITY DETAIL SCREEN ========== -->
  <div class="screen" id="screen-facility-detail">
    <div id="facility-detail-content"></div>
  </div>

  <!-- ========== ROOM BOOKING SCREEN (date/time selection) ========== -->
  <div class="screen" id="screen-room-booking">
    <div id="room-booking-content"></div>
  </div>

  <!-- ========== CONFIRM SCREEN ========== -->
  <div class="screen" id="screen-confirm">
    <div class="section-title">確認・お客様情報入力</div>

    <div class="summary-card" id="booking-summary"></div>

    <div class="card confirm-form">
      <div class="form-group">
        <label class="form-label" for="confirm-name">お名前 *</label>
        <input type="text" class="form-input" id="confirm-name" placeholder="山田 太郎">
      </div>
      <div class="form-group">
        <label class="form-label" for="confirm-phone">電話番号 *</label>
        <input type="tel" class="form-input" id="confirm-phone" placeholder="090-1234-5678">
      </div>
      <div class="form-group">
        <label class="form-label" for="confirm-email">メールアドレス</label>
        <input type="email" class="form-input" id="confirm-email" placeholder="example@mail.com">
      </div>
      <div class="form-group">
        <label class="form-label" for="confirm-note">備考</label>
        <textarea class="form-input" id="confirm-note" rows="3" placeholder="ご要望があればご記入ください"></textarea>
      </div>
    </div>

/* ================================================================

   ================================================================ */
function navigate(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const target = document.getElementById(screenId);
  if (target) target.classList.add('active');

  if (screenId === 'screen-top') {
    state.screenHistory = ['screen-top'];
  } else {
    state.screenHistory.push(screenId);
  }
  updateBackButton();
  window.scrollTo(0, 0);
}

function goBack() {
  if (state.screenHistory.length > 1) {
    state.screenHistory.pop();
    const prev = state.screenHistory[state.screenHistory.length - 1];
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(prev).classList.add('active');
    updateBackButton();
    window.scrollTo(0, 0);
  }
}

function updateBackButton() {
  const btn = document.getElementById('backBtn');
  if (state.screenHistory.length > 1) {
    btn.classList.remove('hidden');
  } else {
    btn.classList.add('hidden');
  }
}

/* ================================================================
   DUMMY AVAILABILITY
   ================================================================ */
function hashCode(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = ((hash << 5) - hash) + str.charCodeAt(i);
    hash |= 0;
  }
  return Math.abs(hash);
}

function isAvailable(roomId, date, slot) {
  const seed = hashCode(roomId + date + (slot || ''));
  return (seed % 10) > 2; // 約70%空き
}

// bookingTypeに合わせた空き状況レベル判定
function getAvailabilityLevel(facility, room, date) {
  if (!date) return 'ok';
  const bt = facility.bookingType;

  if (bt === 'stay' || bt === 'allday' || bt === 'camp') {
    // 日単位: 空き or 満室
    return isAvailable(room.id, date, '') ? 'ok' : 'none';
  }
  if (bt === 'slot3') {
    const slots = facility.slots || DEFAULT_SLOT3;
    let avail = 0;
    slots.forEach(s => { if (isAvailable(room.id, date, s.id)) avail++; });
    if (avail === 0) return 'none';
    if (avail <= 1) return 'few';
    return 'ok';
  }
  if (bt === 'hourly') {
    const range = facility.hourlyRange || { start: 8, end: 22 };
    let avail = 0;
    for (let h = range.start; h < range.end; h++) {
      if (isAvailable(room.id, date, h + ':00')) avail++;
    }
    if (avail === 0) return 'none';
    if (avail < 3) return 'few';
    return 'ok';
  }
  if (bt === 'sauna') {
    let avail = 0;
    SAUNA_SLOTS.forEach(s => { if (isAvailable(room.id, date, s)) avail++; });
    if (avail === 0) return 'none';
    if (avail <= 1) return 'few';
    return 'ok';
  }
  return 'ok';
}

function availBadge(level) {
  const labels = { ok: '空きあり', few: '残りわずか', none: '満室' };
  return '<span class="avail-badge ' + level + '">' + labels[level] + '</span>';
}

/* ================================================================
   PRICE HELPERS
   ================================================================ */
function getDisplayPrice(facility, room) {
  // 市民/市外の切り替えに対応した表示用料金
  if (facility.id === 'tennis') {
    return state.isResident ? facility.residentPrice : facility.nonResidentPrice;
  }
  if (facility.id === 'midori' && facility.slots) {
    const slot = facility.slots[0]; // 最安のスロットを表示
    if (state.isStudent) {
      return state.isResident ? slot.studentPrice : slot.studentNonResidentPrice;
    }
    return state.isResident ? slot.price : slot.nonResidentPrice;
  }
  return room.basePrice;
}

function getSlotPrice(facility, slot) {
  if (facility.id === 'midori') {
    if (state.isStudent) {
      return state.isResident ? (slot.studentPrice || slot.price) : (slot.studentNonResidentPrice || slot.nonResidentPrice || slot.price);
    }
    return state.isResident ? slot.price : (slot.nonResidentPrice || slot.price);
  }
  return slot.price;
}

/* ================================================================
   DATE SEARCH
   ================================================================ */
function stepGuests(delta) {
  state.searchGuests = Math.max(1, Math.min(50, state.searchGuests + delta));
  document.getElementById('guest-count').textContent = state.searchGuests;
}

function searchByDate() {
  const dateInput = document.getElementById('search-date');
  if (!dateInput.value) {
    alert('日付を選択してください');
    return;
  }
  state.searchDate = dateInput.value;
  state.guests = state.searchGuests;
  state.flow = 'date';

  const resultsEl = document.getElementById('date-search-results');
  const dateStr = formatDate(state.searchDate);
  let html = '<div class="section-title">' + dateStr + ' の空き施設</div>';

  let found = false;
  FACILITIES.forEach(facility => {
    facility.rooms.forEach(room => {
      if (room.capacity < state.searchGuests) return;
      const level = getAvailabilityLevel(facility, room, state.searchDate);
      found = true;
      const price = getDisplayPrice(facility, room);
      html += '<div class="facility-card" onclick="selectFromDateSearch(\'' + facility.id + '\', \'' + room.id + '\')">';
      html += '  <div class="facility-icon">' + facility.icon + '</div>';
      html += '  <div class="facility-info">';
      html += '    <div class="facility-name">' + room.name + '</div>';
      html += '    <div class="facility-meta">' + facility.name + ' / 定員' + room.capacity + '名</div>';
      html += '    <div class="facility-price">' + price.toLocaleString() + '円 (' + room.unit + ') ' + availBadge(level) + '</div>';
      html += '  </div>';
      html += '  <div class="facility-arrow">&#8250;</div>';
      html += '</div>';
    });
  });

  if (!found) {
    html += '<div class="empty-state"><div class="empty-state-icon">&#128533;</div><div>' + state.searchGuests + '名でご利用可能な施設が見つかりません</div></div>';
  }

  resultsEl.innerHTML = html;
}

function selectFromDateSearch(facilityId, roomId) {
  const facility = FACILITIES.find(f => f.id === facilityId);
  const room = facility.rooms.find(r => r.id === roomId);
  state.selectedFacility = facility;
  state.selectedRoom = room;
  state.selectedDate = state.searchDate;
  state.selectedSlots = [];
  state.selectedHours = [];
  state.selectedNights = 1;
  state.campSites = 1;
  state.campTents = 0;
  state.lodgeSheets = 0;
  state.saunaTowels = 0;
  showRoomBooking();
}

   ================================================================ */
function renderFacilityList(category) {
  const listEl = document.getElementById('facility-list');
  const filtered = category === 'all' ? FACILITIES : FACILITIES.filter(f => f.category === category);

  if (filtered.length === 0) {
    listEl.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#128269;</div><div>該当する施設がありません</div></div>';
    return;
  }

  let html = '';
  filtered.forEach(facility => {
    const minPrice = Math.min(...facility.rooms.map(r => getDisplayPrice(facility, r)));
    const roomNames = facility.rooms.length <= 3
      ? facility.rooms.map(r => r.name).join('、')
      : facility.rooms.slice(0, 2).map(r => r.name).join('、') + ' 他' + (facility.rooms.length - 2) + '室';
    html += '<div class="facility-card" onclick="showFacilityDetail(\'' + facility.id + '\')">';
    html += '  <div class="facility-icon">' + facility.icon + '</div>';
    html += '  <div class="facility-info">';
    html += '    <div class="facility-name">' + facility.name + '</div>';
    html += '    <div class="facility-meta">' + facility.rooms.length + '室・' + roomNames + '</div>';
    html += '    <div class="facility-price">' + minPrice.toLocaleString() + '円〜</div>';
    html += '  </div>';
    html += '  <div class="facility-arrow">&#8250;</div>';
    html += '</div>';
  });
  listEl.innerHTML = html;
}

function filterFacilities(category, tabEl) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');
  renderFacilityList(category);
}

function renderRoomCard(facility, room, dateStr) {

function updateRoomAvailability(facilityId) {
  const dateInput = document.getElementById('detail-date');
  const dateStr = dateInput.value;
  const facility = FACILITIES.find(f => f.id === facilityId);
  const container = document.getElementById('room-list-' + facilityId);

  facility.rooms.forEach(room => {
    html += renderRoomCard(facility, room, dateStr);
  });

function selectRoom(facilityId, roomId) {
  const facility = FACILITIES.find(f => f.id === facilityId);
  const room = facility.rooms.find(r => r.id === roomId);
  state.selectedFacility = facility;
  state.selectedRoom = room;

  const dateInput = document.getElementById('detail-date');
  state.selectedDate = dateInput ? dateInput.value : '';
  state.selectedSlots = [];
  state.selectedHours = [];
  state.selectedNights = 1;
  state.campSites = 1;
  state.campTents = 0;
  state.lodgeSheets = 0;
  state.saunaTowels = 0;

  showRoomBooking();
}

   ROOM BOOKING (adaptive to bookingType)

function renderExtras(facility) {
  let html = '';
  facility.extras.forEach(extra => {
    html += '<div class="form-group">';
    html += '<label class="form-label">' + extra.name + ' (' + extra.price.toLocaleString() + '円/' + extra.unit + ')</label>';
    html += '<div class="stepper">';
    html += '<button class="stepper-btn" onclick="stepExtra(\'' + extra.id + '\', -1)">-</button>';
    html += '<span class="stepper-value" id="extra-' + extra.id + '-count">' + getExtraCount(extra.id) + '</span>';
    html += '<span class="stepper-unit">' + extra.unit + '</span>';
    html += '<button class="stepper-btn" onclick="stepExtra(\'' + extra.id + '\', 1)">+</button>';
    html += '</div></div>';
  });
  return html;
}

function getExtraCount(extraId) {
  if (extraId === 'tent') return state.campTents;
  if (extraId === 'sheet') return state.lodgeSheets;
  if (extraId === 'towel') return state.saunaTowels;
  return 0;
}

function stepExtra(extraId, delta) {
  if (extraId === 'tent') {
    state.campTents = Math.max(0, Math.min(20, state.campTents + delta));
    document.getElementById('extra-tent-count').textContent = state.campTents;
  }
  if (extraId === 'sheet') {
    state.lodgeSheets = Math.max(0, Math.min(10, state.lodgeSheets + delta));
    document.getElementById('extra-sheet-count').textContent = state.lodgeSheets;
  }
  if (extraId === 'towel') {
    state.saunaTowels = Math.max(0, Math.min(8, state.saunaTowels + delta));
    document.getElementById('extra-towel-count').textContent = state.saunaTowels;
  }
  updateStayPriceInfo();
  updateBookingPriceSummary();
}

function onBookingDateChange() {
  const dateInput = document.getElementById('booking-date');
  state.selectedDate = dateInput ? dateInput.value : '';
  state.selectedSlots = [];
  state.selectedHours = [];

  const facility = state.selectedFacility;
  if (!facility) return;
  const bt = facility.bookingType;

  if (bt === 'slot3' && state.selectedDate) renderSlot3Grid();
  if (bt === 'hourly' && state.selectedDate) renderHourlyGrid();
  if (bt === 'sauna' && state.selectedDate) renderSaunaSlots();
  if (bt === 'stay' || bt === 'camp') updateStayPriceInfo();
  updateBookingPriceSummary();
}

/* ----- 3コマ制グリッド ----- */
function renderSlot3Grid() {
  const grid = document.getElementById('slot3-grid');
  if (!grid) return;
  const facility = state.selectedFacility;
  const room = state.selectedRoom;
  const date = state.selectedDate;
  const slots = facility.slots || DEFAULT_SLOT3;

  let html = '';
  slots.forEach(slot => {
    const avail = isAvailable(room.id, date, slot.id);
    const cls = avail ? '' : ' unavailable';
    const sel = state.selectedSlots.includes(slot.id) ? ' selected' : '';
    const price = getSlotPrice(facility, slot);
    html += '<div class="timeslot' + cls + sel + '" onclick="toggleSlot3(\'' + slot.id + '\', this, ' + avail + ')">';
    html += slot.label + '<br><span style="font-size:0.75rem">' + slot.time + '</span>';
    html += '<span class="timeslot-price">' + price.toLocaleString() + '円</span>';
    html += '</div>';
  });
  grid.innerHTML = html;
}

function toggleSlot3(slotId, el, avail) {
  if (!avail) return;
  const facility = state.selectedFacility;
  const slots = facility.slots || DEFAULT_SLOT3;

  // 「通し」選択時は他を解除、他選択時は「通し」を解除
  if (slotId === 'all') {
    state.selectedSlots = ['all'];
  } else {
    state.selectedSlots = state.selectedSlots.filter(s => s !== 'all');
    const idx = state.selectedSlots.indexOf(slotId);
    if (idx >= 0) {
      state.selectedSlots.splice(idx, 1);
    } else {
      state.selectedSlots.push(slotId);
    }
  }
  renderSlot3Grid(); // 再レンダリングで選択状態を反映
  updateBookingPriceSummary();
}

/* ----- 1時間刻みグリッド ----- */
function renderHourlyGrid() {
  const grid = document.getElementById('hourly-grid');
  if (!grid) return;
  const facility = state.selectedFacility;
  const room = state.selectedRoom;
  const date = state.selectedDate;
  const range = facility.hourlyRange || { start: 8, end: 22 };

  let html = '';
  for (let h = range.start; h < range.end; h++) {
    const slot = h + ':00';
    const avail = isAvailable(room.id, date, slot);
    const cls = avail ? '' : ' unavailable';
    const sel = state.selectedHours.includes(h) ? ' selected' : '';
    const label = (h < 10 ? '0' : '') + h + ':00';
    html += '<div class="hourly-slot' + cls + sel + '" onclick="toggleHour(' + h + ', this, ' + avail + ')">' + label + '</div>';
  }
  grid.innerHTML = html;
}

function toggleHour(hour, el, avail) {
  if (!avail) return;
  const idx = state.selectedHours.indexOf(hour);
  if (idx >= 0) {
    state.selectedHours.splice(idx, 1);
    el.classList.remove('selected');
  } else {
    state.selectedHours.push(hour);
    el.classList.add('selected');
  }
  updateBookingPriceSummary();
}

/* ----- サウナスロット ----- */
function renderSaunaSlots() {
  const grid = document.getElementById('sauna-slot-grid');
  if (!grid) return;
  const room = state.selectedRoom;
  const date = state.selectedDate;

  let html = '';
  SAUNA_SLOTS.forEach(slot => {
    const avail = isAvailable(room.id, date, slot);
    const cls = avail ? '' : ' unavailable';
    const sel = state.selectedSlots.includes(slot) ? ' selected' : '';
    html += '<div class="timeslot' + cls + sel + '" onclick="toggleSaunaSlot(\'' + slot + '\', this, ' + avail + ')">' + slot + '</div>';
  });
  grid.innerHTML = html;
}

function toggleSaunaSlot(slot, el, avail) {
  if (!avail) return;
  state.selectedSlots = [slot];
  renderSaunaSlots();
  updateBookingPriceSummary();
}

/* ----- 共通ステッパー ----- */
function stepBookingGuests(delta) {
  const max = state.selectedRoom ? state.selectedRoom.capacity : 50;
  state.guests = Math.max(1, Math.min(max, state.guests + delta));
  const el = document.getElementById('booking-guest-count');
  if (el) el.textContent = state.guests;
  updateStayPriceInfo();
  updateBookingPriceSummary();
}

function stepNights(delta) {
  state.selectedNights = Math.max(1, Math.min(14, state.selectedNights + delta));
  const el = document.getElementById('nights-count');
  if (el) el.textContent = state.selectedNights;
  updateStayPriceInfo();
  updateBookingPriceSummary();
}

function stepCampSites(delta) {
  state.campSites = Math.max(1, Math.min(10, state.campSites + delta));
  const el = document.getElementById('camp-sites-count');
  if (el) el.textContent = state.campSites;
  updateStayPriceInfo();
  updateBookingPriceSummary();
}

/* ----- 宿泊料金表示 ----- */
function updateStayPriceInfo() {
  const el = document.getElementById('stay-price-info');
  if (!el) return;
  const room = state.selectedRoom;
  const facility = state.selectedFacility;
  if (!room || !facility) return;
  const bt = facility.bookingType;

  if (bt === 'stay') {
    // 6畳は1名/泊、27畳・体験学習室は基本料金+超過
    const isPerPerson = room.unit.includes('1名');
    let total;
    if (isPerPerson) {
      total = room.basePrice * state.guests * state.selectedNights;
      el.innerHTML = room.basePrice.toLocaleString() + '円 x ' + state.guests + '名 x ' + state.selectedNights + '泊 = <strong>' + total.toLocaleString() + '円</strong>';
    } else {
      total = room.basePrice * state.selectedNights;
      el.innerHTML = '基本料金 ' + room.basePrice.toLocaleString() + '円 x ' + state.selectedNights + '泊 = <strong>' + total.toLocaleString() + '円</strong>';
      if (room.extraAdult) {
        el.innerHTML += '<br><span style="font-size:0.85rem;color:var(--text-light)">超過料金は確認画面で加算されません（施設にてお支払い）</span>';
      }
    }
    // ロッジシーツ
    if (facility.extras) {
      let extTotal = 0;
      facility.extras.forEach(ex => { extTotal += ex.price * getExtraCount(ex.id); });
      if (extTotal > 0) {
        el.innerHTML += '<br>オプション: +' + extTotal.toLocaleString() + '円';
      }
    }
  }

  if (bt === 'camp') {
    const siteTotal = room.basePrice * state.campSites * state.selectedNights;
    const tentTotal = state.campTents * 50;
    const total = siteTotal + tentTotal;
    let info = room.basePrice.toLocaleString() + '円 x ' + state.campSites + '区画 x ' + state.selectedNights + '泊 = ' + siteTotal.toLocaleString() + '円';
    if (tentTotal > 0) {
      info += '<br>テント追加: 50円 x ' + state.campTents + '張 = ' + tentTotal.toLocaleString() + '円';
    }
    info += '<br><strong>合計: ' + total.toLocaleString() + '円</strong>';
    el.innerHTML = info;
  }
}

/* ----- 合計金額計算 ----- */
function calculateTotal() {
  const room = state.selectedRoom;
  const facility = state.selectedFacility;
  if (!room || !facility) return 0;
  const bt = facility.bookingType;

  if (bt === 'stay') {
    const isPerPerson = room.unit.includes('1名');
    let total = isPerPerson
      ? room.basePrice * state.guests * state.selectedNights
      : room.basePrice * state.selectedNights;
    // ロッジシーツ等
    if (facility.extras) {
      facility.extras.forEach(ex => { total += ex.price * getExtraCount(ex.id); });
    }
    return total;
  }

  if (bt === 'camp') {
    let total = room.basePrice * state.campSites * state.selectedNights;
    total += state.campTents * 50;
    return total;
  }

  if (bt === 'slot3') {
    const slots = facility.slots || [];
    let total = 0;
    state.selectedSlots.forEach(sid => {
      const slot = slots.find(s => s.id === sid);
      if (slot) total += getSlotPrice(facility, slot);
    });
    return total;
  }

  if (bt === 'allday') {
    return room.basePrice;
  }

  if (bt === 'hourly') {
    if (facility.id === 'tennis') {
      const courtPrice = state.isResident ? facility.residentPrice : facility.nonResidentPrice;
      const lightPrice = state.isResident ? facility.lightResident : facility.lightNonResident;
      let total = 0;
      state.selectedHours.forEach(h => {
        total += courtPrice;
        if (h >= 17) total += lightPrice; // 夜間照明
      });
      return total;
    }
    return room.basePrice * state.selectedHours.length;
  }

  if (bt === 'sauna') {
    let total = room.basePrice * state.selectedSlots.length;
    total += state.saunaTowels * 550;
    return total;
  }

  return 0;
}

function updateBookingPriceSummary() {
  const el = document.getElementById('booking-price-summary');
  if (!el) return;
  const total = calculateTotal();
  if (total > 0) {
    el.style.display = 'block';
    el.innerHTML = '<div style="display:flex;justify-content:space-between;font-size:1.1rem"><span style="font-weight:600">合計金額</span><span style="font-weight:700;color:var(--danger)">' + total.toLocaleString() + '円</span></div>';
  } else {
    el.style.display = 'none';
  }
}

/* ================================================================
   CONFIRM SCREEN
   ================================================================ */
function proceedToConfirm() {
  if (!state.selectedDate) {
    alert('日付を選択してください');
    return;
  }
  const facility = state.selectedFacility;
  const bt = facility.bookingType;

  // バリデーション
  if (bt === 'slot3' && state.selectedSlots.length === 0) {
    alert('時間帯を選択してください');
    return;
  }
  if (bt === 'hourly' && state.selectedHours.length === 0) {
    alert('時間帯を選択してください');
    return;
  }
  if (bt === 'sauna' && state.selectedSlots.length === 0) {
    alert('時間帯を選択してください');
    return;
  }

  const room = state.selectedRoom;
  const total = calculateTotal();
  const dateStr = formatDate(state.selectedDate);

  // 時間帯文字列の生成
  let timeStr = '';
  if (bt === 'stay') {
    const checkout = addDays(state.selectedDate, state.selectedNights);
    timeStr = dateStr + ' ' + facility.checkin + ' ~ ' + formatDate(checkout) + ' ' + facility.checkout + '（' + state.selectedNights + '泊）';
  } else if (bt === 'camp') {
    const checkout = addDays(state.selectedDate, state.selectedNights);
    timeStr = dateStr + ' ' + facility.checkin + ' ~ ' + formatDate(checkout) + ' ' + facility.checkout + '（' + state.selectedNights + '泊）';
  } else if (bt === 'slot3') {
    const slots = facility.slots || DEFAULT_SLOT3;
    const labels = state.selectedSlots.map(sid => {
      const s = slots.find(x => x.id === sid);
      return s ? s.label + '(' + s.time + ')' : sid;
    });
    timeStr = dateStr + ' ' + labels.join(', ');
  } else if (bt === 'allday') {
    timeStr = dateStr + ' ' + (facility.timeRange || '8:30-22:00');
  } else if (bt === 'hourly') {
    const sorted = [...state.selectedHours].sort((a, b) => a - b);
    const labels = sorted.map(h => (h < 10 ? '0' : '') + h + ':00');
    timeStr = dateStr + ' ' + labels.join(', ');
  } else if (bt === 'sauna') {
    timeStr = dateStr + ' ' + state.selectedSlots[0];
  }

  const summaryEl = document.getElementById('booking-summary');
  let html = '';
  html += '<div class="summary-row"><span class="summary-label">施設</span><span class="summary-value">' + facility.name + '</span></div>';
  html += '<div class="summary-row"><span class="summary-label">部屋/区画</span><span class="summary-value">' + room.name + '</span></div>';
  html += '<div class="summary-row"><span class="summary-label">日時</span><span class="summary-value">' + timeStr + '</span></div>';

  if (bt === 'stay' || bt === 'sauna') {
    html += '<div class="summary-row"><span class="summary-label">人数</span><span class="summary-value">' + state.guests + '名</span></div>';
  }
  if (bt === 'camp') {
    html += '<div class="summary-row"><span class="summary-label">区画数</span><span class="summary-value">' + state.campSites + '区画</span></div>';
    if (state.campTents > 0) {
      html += '<div class="summary-row"><span class="summary-label">テント追加</span><span class="summary-value">' + state.campTents + '張</span></div>';
    }
  }
  if (facility.id === 'tennis' || facility.id === 'midori') {
    html += '<div class="summary-row"><span class="summary-label">利用者区分</span><span class="summary-value">' + (state.isResident ? '伊予市民' : '市外') + (state.isStudent ? '（学生）' : '') + '</span></div>';
  }

  // オプション表示
  if (facility.extras) {
    facility.extras.forEach(ex => {
      const cnt = getExtraCount(ex.id);
      if (cnt > 0) {
        html += '<div class="summary-row"><span class="summary-label">' + ex.name + '</span><span class="summary-value">' + cnt + ex.unit + ' (' + (ex.price * cnt).toLocaleString() + '円)</span></div>';
      }
    });
  }

  html += '<div class="summary-total"><span>合計</span><span class="summary-total-price">' + total.toLocaleString() + '円</span></div>';
  summaryEl.innerHTML = html;

  state.totalPrice = total;
  state.timeStr = timeStr;

  navigate('screen-confirm');
}

function submitBooking() {
  const name = document.getElementById('confirm-name').value.trim();
  const phone = document.getElementById('confirm-phone').value.trim();
  const email = document.getElementById('confirm-email').value.trim();
  const note = document.getElementById('confirm-note').value.trim();

  if (!name) { alert('お名前を入力してください'); return; }
  if (!phone) { alert('電話番号を入力してください'); return; }

  const bookingId = 'FTM-' + Date.now().toString(36).toUpperCase();

  const booking = {
    id: bookingId,
    facilityId: state.selectedFacility.id,
    facilityName: state.selectedFacility.name,
    roomId: state.selectedRoom.id,
    roomName: state.selectedRoom.name,
    bookingType: state.selectedFacility.bookingType,
    date: state.selectedDate,
    slots: state.selectedSlots,
    hours: state.selectedHours,
    nights: state.selectedNights,
    guests: state.guests,
    campSites: state.campSites,
    campTents: state.campTents,
    lodgeSheets: state.lodgeSheets,
    saunaTowels: state.saunaTowels,
    isResident: state.isResident,
    isStudent: state.isStudent,
    total: state.totalPrice,
    timeStr: state.timeStr,
    name: name,
    phone: phone,
    email: email,
    note: note,
    createdAt: new Date().toISOString(),
  };

  const bookings = JSON.parse(localStorage.getItem('futami_bookings') || '[]');
  bookings.push(booking);
  localStorage.setItem('futami_bookings', JSON.stringify(bookings));

  document.getElementById('done-booking-id').textContent = '予約番号: ' + bookingId;

  const doneSummary = document.getElementById('done-summary');
  let html = '';
  html += '<div class="summary-row"><span class="summary-label">施設</span><span class="summary-value">' + booking.facilityName + '</span></div>';
  html += '<div class="summary-row"><span class="summary-label">部屋/区画</span><span class="summary-value">' + booking.roomName + '</span></div>';
  html += '<div class="summary-row"><span class="summary-label">日時</span><span class="summary-value">' + booking.timeStr + '</span></div>';
  html += '<div class="summary-row"><span class="summary-label">お名前</span><span class="summary-value">' + booking.name + '</span></div>';
  html += '<div class="summary-row"><span class="summary-label">電話番号</span><span class="summary-value">' + booking.phone + '</span></div>';
  if (booking.email) {
    html += '<div class="summary-row"><span class="summary-label">メール</span><span class="summary-value">' + booking.email + '</span></div>';
  }
  html += '<div class="summary-total"><span>合計金額</span><span class="summary-total-price">' + booking.total.toLocaleString() + '円</span></div>';
  doneSummary.innerHTML = html;

  document.getElementById('confirm-name').value = '';
  document.getElementById('confirm-phone').value = '';
  document.getElementById('confirm-email').value = '';
  document.getElementById('confirm-note').value = '';

  navigate('screen-done');
}

/* ================================================================
   UTILS
   ================================================================ */
function getTodayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const days = ['日', '月', '火', '水', '木', '金', '土'];
  return (d.getMonth() + 1) + '月' + d.getDate() + '日(' + days[d.getDay()] + ')';
}

function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

/* ================================================================
   INIT
   ================================================================ */
document.addEventListener('DOMContentLoaded', function() {
  const searchDate = document.getElementById('search-date');
  searchDate.min = getTodayStr();
  searchDate.value = getTodayStr();

  renderFacilityList('all');
});
</script>
