var _fbUser = null;
_fbAuth.onAuthStateChanged(function(user) {

    _fbUser = user;

  }
});
async function getAuthHeader() {
  if (_fbUser) {
    var token = await _fbUser.getIdToken();

}
function doLogin() {

<script>
// ===== 設定 =====
const API_BASE = 'https://asia-northeast1-futami-yoyaku-492607.cloudfunctions.net';
const AVAILABILITY_URL = 'https://availability-6ry33ad4oa-an.a.run.app';
// APIキーは廃止済み。Firebase Auth IDトークンのみで認証。

// ===== ROOMS定義（カテゴリ・建物別） =====
const ROOMS = [
  // 宿泊（ふれあいの館）
  { id: 'room_27', name: '1号室（27畳）', building: 'ふれあいの館', category: 'stay' },
  { id: 'room_6_1', name: '2号室（6畳）', building: 'ふれあいの館', category: 'stay' },
  { id: 'room_6_2', name: '3号室（6畳）', building: 'ふれあいの館', category: 'stay' },
  { id: 'room_6_3', name: '5号室（6畳）', building: 'ふれあいの館', category: 'stay' },
  { id: 'room_6_4', name: '6号室（6畳）', building: 'ふれあいの館', category: 'stay' },
  { id: 'room_exp', name: '体験学習室（25畳）', building: 'ふれあいの館', category: 'stay' },
  // 日帰り
  { id: 'room_train', name: '研修室', building: '日帰り施設', category: 'day' },
  { id: 'room_kitchen', name: '厨房・食堂', building: '日帰り施設', category: 'day' },
  // スポーツ（テニスは別画面 staff_tennis.html）
  { id: 'midori', name: 'みどりの広場', building: 'スポーツ施設', category: 'sport' },
  // サウナ
  { id: 'sauna', name: 'サンセットサウナ', building: 'サウナ', category: 'sauna' },
  // アウトドア
  { id: 'camp', name: 'キャンプ場', building: 'アウトドア', category: 'outdoor' },
  { id: 'lodge_a', name: 'ロッジA', building: 'アウトドア', category: 'outdoor' },
  { id: 'lodge_b', name: 'ロッジB', building: 'アウトドア', category: 'outdoor' },
];

// ===== 状態 =====
let currentMonth = (function(){
  const d = new Date();
  return { year: d.getFullYear(), month: d.getMonth() + 1 };
})();
let currentCategory = 'all';
let RESERVATIONS = []; // listReservations API レスポンス
let FUTAMI_DAYS = new Set(); // ふたみの日リスト
let LAST_SYNC = null;

// ===== ユーティリティ =====
function pad(n) { return n < 10 ? '0' + n : '' + n; }
function dateStr(y, m, d) { return `${y}-${pad(m)}-${pad(d)}`; }
function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }
function dayOfWeek(y, m, d) { return new Date(y, m - 1, d).getDay(); }
function todayStr() {
  const d = new Date();
  return dateStr(d.getFullYear(), d.getMonth() + 1, d.getDate());
}

// ===== データ取得 =====
async function loadData() {
  document.getElementById('syncIndicator').textContent = '同期中...';
  document.getElementById('syncIndicator').style.background = 'rgba(100,100,100,0.85)';
  try {
    const authH = await getAuthHeader();
    const [resA, resF, resC] = await Promise.all([
      fetch(API_BASE + '/listReservations?t=' + Date.now(), { headers: authH }),
      fetch(API_BASE + '/futamiDays?t=' + Date.now()),
      fetch(API_BASE + '/businessCalendar?t=' + Date.now()),
    ]);
    const dataA = await resA.json();
    const dataF = await resF.json();
    if (resC.ok) { const dataC = await resC.json(); CAL_SETTINGS = dataC; }
    RESERVATIONS = (dataA.reservations || []).filter(r => r.status !== 'cancelled');
    FUTAMI_DAYS = new Set(dataF.dates || []);
    LAST_SYNC = new Date();
    document.getElementById('syncIndicator').textContent = '最終同期: ' + LAST_SYNC.toLocaleTimeString();
    document.getElementById('syncIndicator').style.background = 'rgba(40,140,80,0.85)';
    render();
  } catch (e) {
    console.error('load failed', e);
    document.getElementById('syncIndicator').textContent = '同期エラー';
    document.getElementById('syncIndicator').style.background = 'rgba(220,40,40,0.85)';
  }
}
setInterval(() => { if (_fbUser && !document.hidden) loadData(); }, 60000); // 60秒ごと（ログイン済み＋タブアクティブのみ）

// ===== 予約 → 日付・部屋マップ =====
function buildOccupancyMap() {
  // map[roomId][date] = [reservation, ...]
  const map = {};
  for (const r of RESERVATIONS) {
    if (!Array.isArray(r.slots)) continue;
    // 予約が触れている全日付・全部屋を抽出
    const datesAndRooms = new Set();
    for (const k of r.slots) {
      const parts = k.split('|');
      if (parts.length !== 3) continue;
      let roomId = parts[0];
      if (roomId === 'sauna_share') roomId = 'sauna';
      const date = parts[1];
      datesAndRooms.add(roomId + '|' + date);
    }
    for (const key of datesAndRooms) {
      const [roomId, date] = key.split('|');
      if (!map[roomId]) map[roomId] = {};
      if (!map[roomId][date]) map[roomId][date] = [];
      map[roomId][date].push(r);
    }
  }
  return map;
}

// ===== カテゴリで ROOMS フィルタ =====
function filteredRooms() {
  if (currentCategory === 'all') return ROOMS;
  return ROOMS.filter(r => r.category === currentCategory);
}

// ===== レンダリング =====
function isClosedDayLocal(ds) {
  if (CAL_SETTINGS.forceClosed && CAL_SETTINGS.forceClosed.includes(ds)) return true;
  if (CAL_SETTINGS.forceOpen && CAL_SETTINGS.forceOpen.includes(ds)) return false;
  var d = new Date(ds + 'T00:00:00');
  return (CAL_SETTINGS.defaultClosedDays || [2]).includes(d.getDay());
}

function render() {
  const { year, month } = currentMonth;
  document.getElementById('monthLabel').textContent = `${year}年${month}月`;
  const days = daysInMonth(year, month);
  const today = todayStr();

  // ヘッダー行
  let html = '<thead><tr>';
  html += '<th class="col-room">施設</th>';
  for (let d = 1; d <= days; d++) {
    const ds = dateStr(year, month, d);
    const dow = dayOfWeek(year, month, d);
    let cls = '';
    const closed = isClosedDayLocal(ds);
    if (dow === 6) cls = 'weekend-sat';
    if (dow === 0) cls = 'weekend-sun';
    if (closed) cls = 'closed-day';
    if (FUTAMI_DAYS.has(ds)) cls += ' futami';
    const closedMark = closed ? '<br><span style="font-size:8px;color:#e94560;">休</span>' : '';
    html += `<th class="${cls}">${d}<br><span style="font-size:9px">${'日月火水木金土'[dow]}</span>${closedMark}</th>`;
  }
  html += '</tr></thead>';

  // ボディ
  const occMap = buildOccupancyMap();
  const rooms = filteredRooms();
  // building 別にグループ化
  const byBuilding = {};
  for (const r of rooms) {
    if (!byBuilding[r.building]) byBuilding[r.building] = [];
    byBuilding[r.building].push(r);
  }

  html += '<tbody>';
  for (const [building, list] of Object.entries(byBuilding)) {
    html += `<tr class="building-row"><td colspan="${days + 1}">${building}</td></tr>`;
    for (const room of list) {
      html += `<tr><td class="room-name">${room.name}</td>`;
      for (let d = 1; d <= days; d++) {
        const ds = dateStr(year, month, d);
        const reservations = (occMap[room.id] || {})[ds] || [];
        const count = reservations.length;
        let cellClass = 'cell-empty';
        let label = '';
        if (ds < today) cellClass = 'cell-past';
        else if (isClosedDayLocal(ds) && count === 0) cellClass = 'cell-closed';
        if (count > 0) {
          if (count === 1) cellClass = 'cell-some';
          else if (count <= 3) cellClass = 'cell-many';
          else cellClass = 'cell-full';
          label = `<span class="cell-count">${count}</span>`;
        }
        const onclick = count > 0 ? ` onclick="showCellDetail('${room.id}','${ds}','${room.name.replace(/'/g, '')}')"` : '';
        html += `<td class="${cellClass}"${onclick}>${label}</td>`;
      }
      html += '</tr>';
    }
  }
  html += '</tbody>';

  document.getElementById('monthTable').innerHTML = html;
}

// ===== セルクリック → 詳細ポップアップ =====
function showCellDetail(roomId, ds, roomName) {
  const occMap = buildOccupancyMap();
  const list = (occMap[roomId] || {})[ds] || [];
  if (list.length === 0) return;
  document.getElementById('popupTitle').textContent = roomName;
  document.getElementById('popupSub').textContent = formatDateLabel(ds);
  let html = '';
  for (const r of list) {
    const cat = inferCategory(r);
    const name = (r.customer && r.customer.name) || '?';
    const phone = (r.customer && r.customer.phone) || '';
    const time = inferTime(r, ds);
    const badgeClass = cat || 'all';
    const badgeLabel = { stay: '🌙宿泊', day: '☀️日帰り', sport: '🎾スポーツ', sauna: '🧖サウナ', outdoor: '⛺アウトドア' }[cat] || '予約';
    html += `
      <div class="res-item">
        <div>
          <div class="name">${escapeHtml(name)} ${r.guestCount ? '<span style="color:#6b7280;font-size:11px">'+r.guestCount+'名</span>' : ''}</div>
          <div class="meta">${time}${phone ? ' / ' + escapeHtml(phone) : ''}</div>
        </div>
        <span class="badge ${badgeClass}">${badgeLabel}</span>
      </div>`;
  }
  document.getElementById('popupBody').innerHTML = html;
  document.getElementById('popupOverlay').classList.add('show');
}

function closePopup() {
  document.getElementById('popupOverlay').classList.remove('show');
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = String(s == null ? '' : s);
  return d.innerHTML;
}

function inferCategory(r) {
  const room = (r.roomIds && r.roomIds[0]) || '';
  const norm = room === 'sauna_share' ? 'sauna' : room;
  const def = ROOMS.find(x => x.id === norm);
  return def ? def.category : 'all';
}

function inferTime(r, ds) {
  if (!Array.isArray(r.slots)) return '';
  const hours = r.slots
    .filter(k => k.split('|')[1] === ds)
    .map(k => parseInt(k.split('|')[2], 10))
    .sort((a, b) => a - b);
  if (hours.length === 0) {
    // 翌朝食い込み（前日宿泊）
    return '前泊継続';
  }
  const first = hours[0];
  const last = hours[hours.length - 1];
  return `${first}:00〜${last + 1}:00`;
}

function formatDateLabel(ds) {
  const [y, m, d] = ds.split('-').map(Number);
  const dow = '日月火水木金土'[new Date(y, m - 1, d).getDay()];
  let label = `${y}年${m}月${d}日（${dow}）`;
  if (FUTAMI_DAYS.has(ds)) label += ' ★ふたみの日';
  return label;
}

// ===== ナビゲーション =====
function changeMonth(delta) {
  currentMonth.month += delta;
  if (currentMonth.month > 12) { currentMonth.month = 1; currentMonth.year++; }
  if (currentMonth.month < 1) { currentMonth.month = 12; currentMonth.year--; }
  render();
}
function goToday() {
  const d = new Date();
  currentMonth = { year: d.getFullYear(), month: d.getMonth() + 1 };
  render();
}
function setCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(el => {
    el.classList.toggle('active', el.dataset.cat === cat);
  });
  render();
}

// ===== 営業カレンダー管理 =====
var CAL_SETTINGS = { defaultClosedDays: [2], forceOpen: [], forceClosed: [] };

async function loadCalendarSettings() {
  try {
    const res = await fetch(API_BASE + '/businessCalendar?t=' + Date.now());
    if (res.ok) CAL_SETTINGS = await res.json();
  } catch(e) {}
}

async function openCalendarSettings() {
  document.getElementById('calModal').style.display = 'flex';
  document.getElementById('calModalBody').innerHTML = '<p style="text-align:center;color:#666;">読み込み中...</p>';
  await loadCalendarSettings();
  renderCalendarModal();
}

function closeCalendarModal() {
  document.getElementById('calModal').style.display = 'none';
}

function renderCalendarModal() {
  const days = ['日','月','火','水','木','金','土'];
  let html = '<h3 style="margin-bottom:12px;color:#0f3460;">営業カレンダー設定</h3>';

  // 定休曜日
  html += '<div style="margin-bottom:16px;"><strong>定休曜日</strong><div style="display:flex;gap:6px;margin-top:6px;">';
  for (let i = 0; i < 7; i++) {
    const checked = (CAL_SETTINGS.defaultClosedDays || []).includes(i);
    html += '<label style="padding:6px 10px;border-radius:6px;cursor:pointer;font-size:13px;' +
      (checked ? 'background:#e94560;color:#fff;' : 'background:#f3f4f6;color:#374151;') +
      '"><input type="checkbox" data-dow="' + i + '" ' + (checked ? 'checked' : '') +
      ' onchange="toggleClosedDay(' + i + ')" style="display:none;">' + days[i] + '</label>';
  }
  html += '</div></div>';

  // 営業強制日（forceOpen）
  html += '<div style="margin-bottom:16px;"><strong>特別営業日</strong>（定休日でも営業する日）';
  html += '<div style="display:flex;gap:6px;align-items:center;margin-top:6px;">';
  html += '<input type="date" id="addForceOpen" style="padding:6px;border:1px solid #ccc;border-radius:6px;">';
  html += '<button onclick="addForceDate(\'forceOpen\')" style="padding:6px 12px;background:#16c79a;color:#fff;border:none;border-radius:6px;cursor:pointer;">追加</button></div>';
  html += '<div style="display:flex;gap:6px;align-items:center;margin-top:6px;">';
  html += '<input type="date" id="rangeOpenFrom" style="padding:6px;border:1px solid #ccc;border-radius:6px;width:130px;">';
  html += '<span>〜</span>';
  html += '<input type="date" id="rangeOpenTo" style="padding:6px;border:1px solid #ccc;border-radius:6px;width:130px;">';
  html += '<button onclick="addForceRange(\'forceOpen\')" style="padding:6px 12px;background:#16c79a;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;">期間の定休日を一括営業</button></div>';
  html += '<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px;">';
  (CAL_SETTINGS.forceOpen || []).sort().forEach(d => {
    html += '<span style="background:#d1fae5;padding:2px 8px;border-radius:10px;font-size:12px;">' + d +
      ' <span onclick="removeForceDate(\'forceOpen\',\'' + d + '\')" style="cursor:pointer;color:#e94560;">✕</span></span>';
  });
  html += '</div></div>';

  // 休業強制日（forceClosed）
  html += '<div style="margin-bottom:16px;"><strong>臨時休業日</strong>（営業日でも休業する日）';
  html += '<div style="display:flex;gap:6px;align-items:center;margin-top:6px;">';
  html += '<input type="date" id="addForceClosed" style="padding:6px;border:1px solid #ccc;border-radius:6px;">';
  html += '<button onclick="addForceDate(\'forceClosed\')" style="padding:6px 12px;background:#e94560;color:#fff;border:none;border-radius:6px;cursor:pointer;">追加</button></div>';
  html += '<div style="display:flex;gap:6px;align-items:center;margin-top:6px;">';
  html += '<input type="date" id="rangeClosedFrom" style="padding:6px;border:1px solid #ccc;border-radius:6px;width:130px;">';
  html += '<span>〜</span>';
  html += '<input type="date" id="rangeClosedTo" style="padding:6px;border:1px solid #ccc;border-radius:6px;width:130px;">';
  html += '<button onclick="addForceRange(\'forceClosed\')" style="padding:6px 12px;background:#e94560;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;">期間一括休業</button></div>';
  html += '<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px;">';
  (CAL_SETTINGS.forceClosed || []).sort().forEach(d => {
    html += '<span style="background:#fecaca;padding:2px 8px;border-radius:10px;font-size:12px;">' + d +
      ' <span onclick="removeForceDate(\'forceClosed\',\'' + d + '\')" style="cursor:pointer;color:#666;">✕</span></span>';
  });
  html += '</div></div>';

  document.getElementById('calModalBody').innerHTML = html;
}

async function toggleClosedDay(dow) {
  let arr = CAL_SETTINGS.defaultClosedDays || [];
  if (arr.includes(dow)) arr = arr.filter(d => d !== dow);
  else arr.push(dow);
  CAL_SETTINGS.defaultClosedDays = arr;
  await saveCalendarSettings();
  renderCalendarModal();
}

async function addForceDate(field) {
  const input = document.getElementById(field === 'forceOpen' ? 'addForceOpen' : 'addForceClosed');
  const val = input.value;
  if (!val) return;
  if (!CAL_SETTINGS[field]) CAL_SETTINGS[field] = [];
  if (!CAL_SETTINGS[field].includes(val)) CAL_SETTINGS[field].push(val);
  input.value = '';
  await saveCalendarSettings();
  renderCalendarModal();
}

async function addForceRange(field) {
  var fromId = field === 'forceOpen' ? 'rangeOpenFrom' : 'rangeClosedFrom';
  var toId = field === 'forceOpen' ? 'rangeOpenTo' : 'rangeClosedTo';
  var from = document.getElementById(fromId).value;
  var to = document.getElementById(toId).value;
  if (!from || !to || from > to) { alert('期間を正しく指定してください'); return; }
  if (!CAL_SETTINGS[field]) CAL_SETTINGS[field] = [];
  var closedDays = CAL_SETTINGS.defaultClosedDays || [2];
  var d = new Date(from + 'T00:00:00');
  var end = new Date(to + 'T00:00:00');
  var count = 0;
  while (d <= end) {
    var ds = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    if (field === 'forceOpen') {
      // 定休曜日に該当する日だけ追加
      if (closedDays.includes(d.getDay()) && !CAL_SETTINGS.forceOpen.includes(ds)) {
        CAL_SETTINGS.forceOpen.push(ds);
        count++;
      }
    } else {
      // 営業日（定休曜日でない日）だけ追加
      if (!closedDays.includes(d.getDay()) && !CAL_SETTINGS.forceClosed.includes(ds)) {
        CAL_SETTINGS.forceClosed.push(ds);
        count++;
      }
    }
    d.setDate(d.getDate() + 1);
  }
  document.getElementById(fromId).value = '';
  document.getElementById(toId).value = '';
  if (count > 0) {
    await saveCalendarSettings();
    renderCalendarModal();
    alert(count + '日追加しました');
  } else {
    alert('追加対象の日がありませんでした');
  }
}

async function removeForceDate(field, date) {
  CAL_SETTINGS[field] = (CAL_SETTINGS[field] || []).filter(d => d !== date);
  await saveCalendarSettings();
  renderCalendarModal();
}

async function saveCalendarSettings() {
  try {
    const authH = await getAuthHeader();
    await fetch(API_BASE + '/businessCalendar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authH },
      body: JSON.stringify(CAL_SETTINGS),
    });
  } catch(e) { alert('保存に失敗しました'); }
}

// ===== 初期化（ログイン後にonAuthStateChangedから呼ばれる） =====
if (_fbUser) loadData();
</script>
